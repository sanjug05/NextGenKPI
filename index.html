function useAppState(){
  const[auth,setAuth]=useState({user:null,viewOnly:false,loading:true});
  const[activeKPI,setActiveKPI]=useState('overview');
  const[sidebarCollapsed,setSidebarCollapsed]=useState(false);

  const[isLoading,setIsLoading]=useState(false);

  const[isOnline,setIsOnline]=useState(navigator.onLine);

    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);

  useEffect(()=>{
    const h=(e)=>{if(e.ctrlKey&&e.key==='p'){e.preventDefault();window.print();}};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);

  const showToast=useCallback((msg,type='success')=>{
    setToast({msg,type,id:Date.now()});setTimeout(()=>setToast(null),3400);
  },[]);

  /* Audit log writer */
  const writeAuditLog=useCallback(async(action,module,details={})=>{
    try{
      const log={id:genId(),timestamp:new Date().toISOString(),user:authRef.current.user?.name||'Unknown',role:authRef.current.user?.role||'Viewer',action,module,...details};
      setCollections(prev=>({...prev,ch_audit_logs:[log,...(prev.ch_audit_logs||[])].slice(0,200)}));
      await fbDb.collection('ch_audit_logs').doc(log.id).set(log);
    }catch{}
  },[]);

  /* Workflow automation — auto-create actions for KPI failures */
  const triggerWorkflow=useCallback(async(trigger,data,colls)=>{
    const now=new Date().toISOString().slice(0,10);
    const actions=[];
    if(trigger==='audit_low'&&data.score<KPI_CONFIG.auditScoreTarget.target){
      actions.push({title:`Low Audit Score — ${data.showroomName||data.name}`,description:`Score ${data.score}% is below ${KPI_CONFIG.auditScoreTarget.target}% target. Corrective action required.`,severity:'High',sourceKPI:'kpi8',assignedTo:KPI_OWNERSHIP.kpi8.owner,reviewer:KPI_OWNERSHIP.kpi8.reviewer,escalationTo:KPI_OWNERSHIP.kpi8.escalation,dueDate:addDays(now,7),zone:data.zone||''});
    }
    if(trigger==='survey_low'&&data.score<KPI_CONFIG.surveyScoreTarget.target){
      actions.push({title:`Low Survey Score — ${data.partnerName||data.name}`,description:`NPS score ${data.score}/100 below target ${KPI_CONFIG.surveyScoreTarget.target}. Follow-up required.`,severity:'Medium',sourceKPI:'kpi7',assignedTo:KPI_OWNERSHIP.kpi7.owner,reviewer:KPI_OWNERSHIP.kpi7.reviewer,escalationTo:KPI_OWNERSHIP.kpi7.escalation,dueDate:addDays(now,5),zone:data.zone||''});
    }
    if(trigger==='cft_fail'){
      actions.push({title:`CFT Failed — ${data.prospectName}`,description:`CFT evaluation failed. Root cause analysis and re-assessment required within 14 days.`,severity:'High',sourceKPI:'kpi3',assignedTo:KPI_OWNERSHIP.kpi3.owner,reviewer:KPI_OWNERSHIP.kpi3.reviewer,escalationTo:KPI_OWNERSHIP.kpi3.escalation,dueDate:addDays(now,14),zone:data.zone||''});
    }
    if(trigger==='cad_delay'&&data.tat>KPI_CONFIG.cadTAT.target){
      actions.push({title:`CAD TAT Breach — ${data.projectName}`,description:`TAT ${data.tat} days exceeds ${KPI_CONFIG.cadTAT.target}-day SLA. Designer capacity review needed.`,severity:'Medium',sourceKPI:'kpi16',assignedTo:KPI_OWNERSHIP.kpi16.owner,reviewer:KPI_OWNERSHIP.kpi16.reviewer,escalationTo:KPI_OWNERSHIP.kpi16.escalation,dueDate:addDays(now,3),zone:data.zone||''});
    }
    if(trigger==='feedback_breach'&&data.adherenceStatus!=='Adhered'){
      actions.push({title:`Feedback SLA Breach — ${data.prospectName}`,description:`CFT feedback not submitted within SLA. Process adherence issue.`,severity:'Medium',sourceKPI:'kpi15',assignedTo:KPI_OWNERSHIP.kpi15.owner,reviewer:KPI_OWNERSHIP.kpi15.reviewer,escalationTo:KPI_OWNERSHIP.kpi15.escalation,dueDate:addDays(now,5),zone:data.zone||''});
    }
    if(trigger==='showroom_opened'){
      actions.push({title:`Audit Reminder — ${data.showroomName}`,description:`${data.showroomName} is now open. Schedule first audit within 30 days.`,severity:'Low',sourceKPI:'kpi8',assignedTo:KPI_OWNERSHIP.kpi8.owner,reviewer:KPI_OWNERSHIP.kpi8.reviewer,escalationTo:KPI_OWNERSHIP.kpi8.escalation,dueDate:addDays(now,30),zone:data.zone||''});
    }
    if(trigger==='partner_onboarded'){
      actions.push({title:`Survey Reminder — ${data.partnerName}`,description:`Schedule first partner NPS survey for ${data.partnerName} within 30 days of onboarding.`,severity:'Low',sourceKPI:'kpi7',assignedTo:KPI_OWNERSHIP.kpi7.owner,reviewer:KPI_OWNERSHIP.kpi7.reviewer,escalationTo:KPI_OWNERSHIP.kpi7.escalation,dueDate:addDays(now,30),zone:data.zone||''});
    }
    for(const act of actions){
      const rec={...act,id:genId(),createdAt:new Date().toISOString(),status:'Open',remarks:'',linkedRecordId:data.id||''};

    }
  },[]);


  const loadAllCollections=useCallback(async(silent=false)=>{
    if(!silent)setIsLoading(true);else setIsSyncing(true);
    try{
      /* Fetch each collection independently so one failure doesn't block others */
      const results=await Promise.allSettled(ALL_COLS.map(col=>fbDb.collection(col).get()));
      const fresh=ALL_COLS.reduce((acc,col,i)=>{
        const r=results[i];
        acc[col]=r.status==='fulfilled'?r.value.docs.map(d=>({id:d.id,...d.data()})):[];
        return acc;
      },{});
      setCollections(fresh);setLastSyncTime(Date.now());
      const failed=results.filter(r=>r.status==='rejected').length;
      if(failed>0)showToast(`${failed} collection(s) failed to load. Showing available data.`,'warning');
    }catch(e){showToast('Failed to load data. Check connection.','error');}
    finally{setIsLoading(false);setIsSyncing(false);}

  },[loadAllCollections]);

  const loginEmail=useCallback(async(email,password)=>{await fbAuth.signInWithEmailAndPassword(email,password);},[]);
  const loginViewOnly=useCallback(async()=>{setAuth({user:{name:'Guest Viewer',role:'Viewer',title:''},viewOnly:true,loading:false});await loadAllCollections(true);},[loadAllCollections]);
  const logout=useCallback(async()=>{if(!auth.viewOnly)await fbAuth.signOut();setAuth({user:null,viewOnly:false,loading:false});setCollections(ALL_COLS.reduce((a,k)=>({...a,[k]:[]}),{}));},[auth.viewOnly]);
  const perms=useMemo(()=>ROLE_PERMS[auth.user?.role]??ROLE_PERMS.Viewer,[auth.user?.role]);

  const addRecord=useCallback(async(col,data,opts={})=>{
    const rec={...data,id:genId(),createdAt:new Date().toISOString()};
    setCollections(prev=>({...prev,[col]:[...(prev[col]||[]),rec]}));
    try{
      await fbDb.collection(col).doc(rec.id).set(rec);
      setLastSyncTime(Date.now());
      if(!opts.silent)await writeAuditLog('CREATE',col,{recordId:rec.id,summary:JSON.stringify(rec).slice(0,200)});
      if(opts.trigger)await triggerWorkflow(opts.trigger,rec,collectionsRef.current);
      return rec;
    }catch(e){
      setCollections(prev=>({...prev,[col]:(prev[col]||[]).filter(r=>r.id!==rec.id)}));
      showToast('Failed to save. Please try again.','error');return null;
    }
  },[showToast,writeAuditLog,triggerWorkflow]);

  const deleteRecord=useCallback(async(col,id)=>{
    if(!window.confirm('Remove this record? This cannot be undone.'))return;
    const backup=collectionsRef.current[col]?.find(r=>r.id===id);
    setCollections(prev=>({...prev,[col]:(prev[col]||[]).filter(r=>r.id!==id)}));
    try{
      await fbDb.collection(col).doc(id).delete();
      showToast('Record removed','neutral');setLastSyncTime(Date.now());
      await writeAuditLog('DELETE',col,{recordId:id});
    }catch(e){
      if(backup)setCollections(prev=>({...prev,[col]:[...(prev[col]||[]),backup]}));
      showToast('Failed to delete. Please try again.','error');
    }
  },[showToast,writeAuditLog]);

  const updateRecord=useCallback(async(col,id,updates)=>{
    const prev=collectionsRef.current[col]?.find(r=>r.id===id);
    setCollections(c=>({...c,[col]:c[col].map(r=>r.id===id?{...r,...updates}:r)}));
    try{
      await fbDb.collection(col).doc(id).update({...updates,updatedAt:new Date().toISOString()});
      showToast('Updated','success');setLastSyncTime(Date.now());
      await writeAuditLog('UPDATE',col,{recordId:id,changes:JSON.stringify(updates).slice(0,200)});
    }catch(e){
      if(prev)setCollections(c=>({...c,[col]:c[col].map(r=>r.id===id?prev:r)}));
      showToast('Update failed.','error');
    }
  },[showToast,writeAuditLog]);

  const refreshData=useCallback(()=>loadAllCollections(false),[loadAllCollections]);

  const exportCSV=useCallback(()=>{
    try{
      const rows=[['Collection','Date','Zone','Name/Partner','Status/Result','Remarks']];
      ALL_COLS.filter(c=>!['ch_audit_logs'].includes(c)).forEach(col=>{
        (collectionsRef.current[col]||[]).forEach(rec=>{
          const df=COL_META[col]?.dateField||'date';
          rows.push([col,rec[df]||rec.date||'',rec.zone||'',rec.prospectName||rec.partnerName||rec.showroomName||rec.projectName||rec.cseName||rec.brandName||rec.recipientName||rec.taskName||rec.title||'',rec.status||rec.result||rec.adherenceStatus||'',rec.remarks||'']);
        });
      });
      const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`AIS_Channel_KPI_${today()}.csv`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      showToast('CSV exported successfully');
    }catch(e){showToast('Export failed','error');}
  },[showToast]);

  const getFiltered=useCallback((col)=>{
    const df=COL_META[col]?.dateField||'date';
    let data=collections[col]||[];
    if(dateRange.start)data=data.filter(r=>{const d=r[df]||r.date||'';return d>=dateRange.start;});
    if(dateRange.end)  data=data.filter(r=>{const d=r[df]||r.date||'';return!d||d<=dateRange.end;});
    if(selectedZone!=='All')data=data.filter(r=>r.zone===selectedZone);
    return[...data].sort((a,b)=>{const da=a[df]||a.date||'',db=b[df]||b.date||'';return db.localeCompare(da);});
  },[collections,dateRange,selectedZone]);

  /* KPI health checker — returns severity for each KPI */
  const kpiHealth=useMemo(()=>{
    try{
      const c=collections||{};
      const f=c.ch_prospect_funnel||[],cft=c.ch_prospect_cft||[],aud=c.ch_showroom_audit||[],surv=c.ch_partner_survey||[],cad=(c.ch_cad_tat||[]).filter(d=>d.tat!=null),crm=c.ch_crm_recovery||[];
      const convRate=safePct(f.filter(d=>d.status==='Converted').length,f.length);

      const crmAch=safePct(sumOf(crm,'amount'),sumOf(crm,'monthPlan'));
      const sev=(val,target)=>val===0?'neutral':val>=target?'Performing':val>=target*.8?'Warning':'Critical';
      return{kpi1:sev(convRate,KPI_CONFIG.prospectConversion.target),kpi3:sev(cftPass,KPI_CONFIG.cftPassRate.target),kpi8:sev(avgAud,KPI_CONFIG.auditScoreTarget.target),kpi7:sev(avgNPS,KPI_CONFIG.surveyScoreTarget.target),kpi16:sev(cadOT,80),kpi10:sev(crmAch,100)};
    }catch{return{};}
  },[collections]);


  /* ── Target management ── */
  const setMonthlyTarget=useCallback(async(kpiId,month,target)=>{
    const id=`${kpiId}_${month}`;
    const doc={id,kpiId,month,target:+target,updatedBy:authRef.current.user?.name||'Admin',updatedAt:new Date().toISOString()};

    await fbDb.collection('ch_targets').doc(id).set(doc);

  const getTarget=useCallback((kpiId,month)=>{

    const arr=collectionsRef.current.ch_targets||[];
    const t=arr.find(t=>t.kpiId===kpiId&&t.month===month);
    return t?+t.target:0;
  },[]);

  const getAllTargets=useCallback((kpiId)=>{
    return MONTHS.map(({p})=>getTarget(kpiId,p));
  },[getTarget]);

  return{auth,loginEmail,loginViewOnly,logout,perms,activeKPI,setActiveKPI,sidebarCollapsed,setSidebarCollapsed,dateRange,setDateRange,selectedZone,setSelectedZone,globalFilters,setGlobalFilters,compactMode,setCompactMode,addRecord,deleteRecord,updateRecord,getFiltered,showToast,toast,isLoading,isSyncing,lastSyncTime,isOnline,refreshData,exportCSV,kpiHealth,triggerWorkflow,collections,setMonthlyTarget,getTarget,getAllTargets};
}

function Gauge({value,max=100,label,color='#00B4D8',size=155}){
  const pct=Math.min(value/max,1),r=(size-24)/2,cx=size/2,cy=size/2,st=Math.PI*.75,en=Math.PI*2.25;
  const xy=(a,rad)=>({x:cx+rad*Math.cos(a),y:cy+rad*Math.sin(a)});
  const s=xy(st,r),e=xy(en,r),v=xy(st+pct*(en-st),r),lg=(en-st)>Math.PI,lv=(pct*(en-st))>Math.PI;
  return(<div style={{textAlign:'center'}}><svg width={size} height={size*.73} viewBox={`0 0 ${size} ${size}`} style={{overflow:'visible'}}><path d={`M${s.x},${s.y} A${r},${r} 0 ${lg?1:0} 1 ${e.x},${e.y}`} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="10" strokeLinecap="round"/>{pct>0&&<path d={`M${s.x},${s.y} A${r},${r} 0 ${lv?1:0} 1 ${v.x},${v.y}`} fill="none" stroke={color} strokeWidth="10" strokeLinecap="round" style={{filter:`drop-shadow(0 0 5px ${color}90)`}}/>}<text x={cx} y={cy+11} textAnchor="middle" fill="#fff" fontSize="19" fontWeight="700">{Math.round(value)}{max===100?'%':''}</text></svg>{label&&<div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginTop:1}}>{label}</div>}</div>);
}



/* ═══ FY ANNUAL BAND ═════════════════════════════════════════ */
function FYBand({kpiId,actual,getTarget,color='#00B4D8'}){
  const fyTarget=MONTHS.reduce((s,{p})=>s+getTarget(kpiId,p),0);
  const pct=safePct(actual,fyTarget);
  const elapsed=Math.max(ELAPSED_MONTHS,1);
  const forecast=Math.round((actual/elapsed)*12);
  const forecastPct=safePct(forecast,fyTarget);
  const health=pct>=100?'#4ade80':pct>=75?'#FFD700':pct>=50?'#fb923c':'#f87171';
  if(fyTarget===0)return null;
  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:14,background:'rgba(255,255,255,.04)',borderRadius:12,padding:'12px 16px',border:`1px solid ${color}25`}}>
      {[
        ['FY Target',fyTarget,color],
        ['YTD Achievement',actual,health],
        [`Achievement (${ELAPSED_MONTHS}/${12} mo)`,`${pct}%`,health],
        ['Year-End Forecast',forecast,forecastPct>=100?'#4ade80':forecastPct>=75?'#FFD700':'#f87171'],
      ].map(([l,v,c])=>(
        <div key={l} style={{textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:3}}>{l}</div>
        </div>
      ))}
      <div style={{gridColumn:'1/-1',marginTop:6}}>
        <div style={{height:5,borderRadius:3,background:'rgba(255,255,255,.08)'}}>
          <div style={{width:`${Math.min(pct,100)}%`,height:'100%',borderRadius:3,background:health,transition:'width .4s'}}/>
        </div>
      </div>
    </div>
  );
}

/* ═══ TARGET SETTER MODAL ════════════════════════════════════ */
function TargetSetter({kpiId,kpiLabel,setMonthlyTarget,getTarget,perms,showToast}){
  const[open,setOpen]=useState(false);
  const[saving,setSaving]=useState(false);
  const[targets,setTargets]=useState(()=>MONTHS.reduce((a,{p})=>({...a,[p]:getTarget(kpiId,p)||''}),{}));
  if(!perms?.canAdd)return null;
  const save=async()=>{
    setSaving(true);
    try{
      const entries=Object.entries(targets).filter(([,val])=>val!=='');
      if(entries.length===0){showToast('No targets entered','warning');setSaving(false);return;}
      await Promise.all(entries.map(([month,val])=>setMonthlyTarget(kpiId,month,+val)));
      showToast(`✅ ${entries.length} target${entries.length>1?'s':''} saved`);
      setOpen(false);
    }catch(e){
      console.error('Target save error:',e);
      showToast('Save failed — check Firestore rules for ch_targets','error');
    }
    setSaving(false);
  };
  const fill=()=>{const first=Object.values(targets).find(v=>v!=='');if(!first)return;setTargets(MONTHS.reduce((a,{p})=>({...a,[p]:first}),{}));};
  return(<>
    <button onClick={()=>{
      // Always refresh from current stored targets when opening
      setTargets(MONTHS.reduce((a,{p})=>({...a,[p]:getTarget(kpiId,p)||''}),{}));
      setOpen(true);
    }} style={{...css.btnSm,color:'#FFD700',border:'1px solid rgba(255,215,0,.3)',background:'rgba(255,215,0,.08)',display:'flex',alignItems:'center',gap:4,fontSize:11}}>🎯 Set Targets</button>
    <Modal open={open} onClose={()=>setOpen(false)} title={`Set Monthly Targets — ${kpiLabel}`} wide>
      <div style={{fontSize:11,color:'rgba(255,255,255,.4)',marginBottom:12}}>Enter count targets for each month of {FY_LABEL}. Leave blank to keep existing.</div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <button onClick={fill} style={{...css.btnSm,fontSize:11}}>↔ Apply first value to all months</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
        {MONTHS.map(({m,p})=>(
          <div key={p}>
            <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.45)',marginBottom:4}}>{m}</div>
            <input type="number" min="0" value={targets[p]} onChange={e=>setTargets(t=>({...t,[p]:e.target.value}))} placeholder="—" style={{...css.inp,textAlign:'center',fontSize:14,fontWeight:700}}/>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:10}}><button onClick={()=>setOpen(false)} style={{...css.btnG,flex:1}} disabled={saving}>Cancel</button><button onClick={save} style={{...css.btnP,flex:1,opacity:saving?.6:1}} disabled={saving}>{saving?'Saving…':'💾 Save All Targets'}</button></div>
    </Modal>
  </>);
}

        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{borderRadius:10,padding:'12px 14px',background:'rgba(74,222,128,.07)',border:'1px solid rgba(74,222,128,.2)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'#4ade80',marginBottom:8}}>✅ What's Going Well</div>
            {(analysis.goingWell||[]).map((p,i)=><div key={i} style={{fontSize:12,color:'rgba(255,255,255,.75)',marginBottom:5,display:'flex',gap:6}}><span style={{color:'#4ade80',flexShrink:0}}>•</span>{p}</div>)}
            {!analysis.goingWell?.length&&<div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>No data</div>}
          </div>
          <div style={{borderRadius:10,padding:'12px 14px',background:'rgba(251,146,60,.07)',border:'1px solid rgba(251,146,60,.2)'}}>
            <div style={{fontSize:11,fontWeight:700,color:'#fb923c',marginBottom:8}}>⚠ Needs Improvement</div>

            {!analysis.needsImprovement?.length&&<div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>No issues found</div>}
          </div>
        </div>
        <div style={{borderRadius:10,padding:'12px 14px',background:'rgba(167,139,250,.07)',border:'1px solid rgba(167,139,250,.25)'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#a78bfa',marginBottom:8}}>🎯 Recommended Actions</div>

        <div style={{display:'flex',gap:10}}><button onClick={runAnalysis} style={{...css.btnSm,flex:1}}>🔄 Refresh Analysis</button><button onClick={()=>setOpen(false)} style={{...css.btnG,flex:1}}>Close</button></div>

function Toast({toast}){

  const st={success:{bg:'rgba(13,31,60,.97)',border:'rgba(0,180,216,.4)',icon:'✅'},error:{bg:'rgba(60,13,13,.97)',border:'rgba(248,113,113,.4)',icon:'❌'},neutral:{bg:'rgba(30,30,50,.97)',border:'rgba(255,255,255,.2)',icon:'🗑'},warning:{bg:'rgba(50,40,10,.97)',border:'rgba(255,215,0,.4)',icon:'⚠️'}}[toast.type]||{bg:'rgba(13,31,60,.97)',border:'rgba(0,180,216,.4)',icon:'✅'};
  return<div key={toast.id} role="alert" style={{position:'fixed',bottom:24,right:24,zIndex:200,background:st.bg,border:`1px solid ${st.border}`,borderRadius:12,padding:'11px 17px',display:'flex',alignItems:'center',gap:9,color:'#fff',fontSize:13,fontWeight:600,boxShadow:'0 8px 30px rgba(0,0,0,.45)',animation:'slideUp .3s ease'}}><span style={{fontSize:16}}>{st.icon}</span>{toast.msg}</div>;
}


/* ═══ SAFE COLLECTION ACCESSOR ══════════════════════════════ */
/**
 * Always returns an array — never crashes if collections or a key is undefined.
 * Use everywhere instead of collections.someKey directly.
 */
const getCol=(collections,key)=>(collections&&collections[key]&&Array.isArray(collections[key]))?collections[key]:[];

/* ═══ ERROR BOUNDARY ═════════════════════════════════════════ */
class AppErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error('AppErrorBoundary caught:',error,info);}
  render(){
    if(!this.state.hasError)return this.props.children;
    return(
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#0A1628',padding:24,gap:16}}>
        <div style={{width:56,height:56,borderRadius:14,background:'rgba(248,113,113,.15)',border:'1px solid rgba(248,113,113,.4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>⚠️</div>
        <div style={{textAlign:'center',maxWidth:480}}>
          <div style={{fontSize:18,fontWeight:800,color:'#fff',marginBottom:8}}>Something went wrong</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.5)',marginBottom:6,lineHeight:1.6}}>
            An unexpected error occurred in the dashboard. Your data is safe in Firestore.
          </div>
          <div style={{fontSize:11,fontFamily:'monospace',color:'#f87171',background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.2)',borderRadius:8,padding:'8px 12px',marginBottom:16,wordBreak:'break-all'}}>
            {String(this.state.error?.message||this.state.error||'Unknown error').slice(0,200)}
          </div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={()=>this.setState({hasError:false,error:null})}
            style={{background:'linear-gradient(135deg,#00B4D8,#0096B7)',color:'#fff',border:'none',borderRadius:9,cursor:'pointer',padding:'10px 20px',fontWeight:700,fontSize:13}}>
            🔄 Retry
          </button>
          <button onClick={()=>window.location.reload()}
            style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.15)',color:'#fff',borderRadius:9,cursor:'pointer',padding:'10px 20px',fontSize:13}}>
            ↺ Reload Page
          </button>
        </div>
      </div>
    );
  }
}

  const conv=safePct(f.filter(d=>d.status==='Converted').length,f.length);
  const cftPass=safePct(cft.filter(d=>d.result==='Pass').length,cft.length);
  const avgAud=avgOf(aud,'score'),avgNPS=avgOf(surv,'score');
  const cadDel=cad.filter(d=>d.tat!=null),avgTAT=cadDel.length?(cadDel.reduce((s,d)=>s+(+d.tat||0),0)/cadDel.length).toFixed(1):0;
  const crmAch=safePct(sumOf(crm,'amount'),sumOf(crm,'monthPlan'));
  const openActions=actions.filter(a=>a.status==='Open'||a.status==='In Progress');
  const critActions=actions.filter(a=>a.severity==='Critical'&&a.status!=='Closed');
  const overdueTasks=tasks.filter(t=>{try{return t.dueDate&&new Date(t.dueDate)<new Date()&&t.status!=='Done';}catch{return false;}});
  const zonePerf=ZONES.map(z=>({zone:z,partners:p.filter(d=>d.zone===z).length,showrooms:s.filter(d=>d.zone===z).length,score:avgOf(aud.filter(d=>d.zone===z),'score')||0}));
  const bestZone=zonePerf.sort((a,b)=>b.partners+b.showrooms-(a.partners+a.showrooms))[0];
  const criticalKPIs=Object.entries(safeKpiHealth).filter(([,v])=>v==='Critical');
  const kpiNames={kpi1:'Prospect Funnel',kpi3:'CFT Clearance',kpi7:'Partner NPS',kpi8:'Audit Score',kpi10:'CRM Recovery',kpi16:'CAD TAT'};

  const CommandCard=({icon,title,value,sub,color,onClick,pulse})=>(
    <div onClick={onClick} className={pulse?'pulse-critical':''} style={{borderRadius:14,padding:'14px 16px',background:`${color}12`,border:`1px solid ${color}30`,cursor:onClick?'pointer':'default',transition:'all .2s'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{fontSize:22}}>{icon}</div>
        {pulse&&<span style={{fontSize:9,fontWeight:800,color:'#f87171',background:'rgba(248,113,113,.2)',padding:'2px 6px',borderRadius:4,animation:'pulse 1.5s infinite'}}>CRITICAL</span>}
      </div>
      <div style={{fontSize:26,fontWeight:800,color,lineHeight:1,marginTop:6}}>{value}</div>
      <div style={{fontSize:12,fontWeight:600,color:'#fff',marginTop:3}}>{title}</div>
      <div style={{fontSize:10,color:'rgba(255,255,255,.45)',marginTop:1}}>{sub}</div>
    </div>
  );

  return(<div style={{display:'flex',flexDirection:'column',gap:16}} className="fade-in">
    {/* Banner */}
    <div style={{borderRadius:18,padding:'16px 20px',background:'linear-gradient(135deg,rgba(248,113,113,.15),rgba(251,146,60,.08))',border:'1px solid rgba(248,113,113,.3)',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:12,alignItems:'center'}}>
      <div>
        <div style={{fontSize:11,fontWeight:700,color:'#f87171',marginBottom:4}}>⚡ OPERATIONAL COMMAND CENTER — {FY_LABEL}</div>
        <div style={{fontSize:20,fontWeight:800,color:'#fff'}}>Executive Summary Dashboard</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,.5)',marginTop:3}}>{critActions.length} critical · {openActions.length} open actions · {overdueTasks.length} overdue tasks</div>
      </div>
      <div style={{display:'flex',gap:16}}>
        {[[critActions.length,'#f87171','Critical'],[openActions.length,'#fb923c','Open Actions'],[overdueTasks.length,'#FFD700','Overdue']].map(([v,c,l])=>(
          <div key={l} style={{textAlign:'center'}}><div style={{fontSize:28,fontWeight:800,color:c,lineHeight:1}}>{v}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)'}}>{l}</div></div>
        ))}
      </div>
    </div>

    {/* Critical KPI Alerts */}
    {criticalKPIs.length>0&&<div style={{...css.glass,borderRadius:16,padding:'14px 18px',border:'1px solid rgba(248,113,113,.3)'}}>
      <div style={{fontSize:12,fontWeight:700,color:'#f87171',marginBottom:10}}>🔴 CRITICAL KPI FAILURES — IMMEDIATE ACTION REQUIRED</div>
      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
        {criticalKPIs.map(([kpi])=>(
          <button key={kpi} onClick={()=>setActiveKPI(kpi)} style={{...css.btnSm,color:'#f87171',border:'1px solid rgba(248,113,113,.4)',background:'rgba(248,113,113,.1)',display:'flex',alignItems:'center',gap:4}}>
            <span className="pulse-critical" style={{width:8,height:8,borderRadius:'50%',background:'#f87171',display:'inline-block'}}/>
            {kpiNames[kpi]||kpi}
          </button>
        ))}
      </div>
    </div>}

    {/* Command cards */}
    <div className="grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
      <CommandCard icon="🎯" title="Prospect Conversion" value={`${conv}%`} sub={`target ${KPI_CONFIG.prospectConversion.target}%`} color={conv>=KPI_CONFIG.prospectConversion.target?'#4ade80':'#f87171'} onClick={()=>setActiveKPI('kpi1')} pulse={conv<KPI_CONFIG.prospectConversion.target*.5}/>
      <CommandCard icon="🧪" title="CFT Pass Rate" value={`${cftPass}%`} sub={`target ${KPI_CONFIG.cftPassRate.target}%`} color={cftPass>=KPI_CONFIG.cftPassRate.target?'#4ade80':'#FFD700'} onClick={()=>setActiveKPI('kpi3')}/>
      <CommandCard icon="⭐" title="Avg Audit Score" value={`${avgAud}%`} sub={`target ${KPI_CONFIG.auditScoreTarget.target}%`} color={avgAud>=KPI_CONFIG.auditScoreTarget.target?'#4ade80':'#fb923c'} onClick={()=>setActiveKPI('kpi8')}/>
      <CommandCard icon="💹" title="CRM Achievement" value={`${crmAch}%`} sub="vs quarterly plan" color={crmAch>=100?'#4ade80':'#FFD700'} onClick={()=>setActiveKPI('kpi10')}/>
      <CommandCard icon="📊" title="Partner NPS" value={`${avgNPS}/100`} sub={`target ${KPI_CONFIG.surveyScoreTarget.target}`} color={avgNPS>=KPI_CONFIG.surveyScoreTarget.target?'#4ade80':'#fb923c'} onClick={()=>setActiveKPI('kpi7')}/>
      <CommandCard icon="⏱" title="Avg CAD TAT" value={`${avgTAT}d`} sub={`SLA ≤${KPI_CONFIG.cadTAT.target} days`} color={+avgTAT<=KPI_CONFIG.cadTAT.target?'#4ade80':'#f87171'} onClick={()=>setActiveKPI('kpi16')} pulse={+avgTAT>KPI_CONFIG.cadTAT.target*1.5}/>
      <CommandCard icon="⚡" title="Open Actions" value={openActions.length} sub={`${critActions.length} critical`} color={critActions.length>0?'#f87171':'#fb923c'} onClick={()=>setActiveKPI('actions')} pulse={critActions.length>0}/>
      <CommandCard icon="✅" title="Overdue Tasks" value={overdueTasks.length} sub="need immediate closure" color={overdueTasks.length>0?'#f87171':'#4ade80'} onClick={()=>setActiveKPI('tasks')} pulse={overdueTasks.length>2}/>
    </div>

    {/* Zone heatmap */}
    <div style={{...css.glass,borderRadius:18,padding:18}}>
      <SL text="Zone Performance Heatmap"/><div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10}}>
        {ZONES.map(z=>{const zd=zonePerf.find(zp=>zp.zone===z)||{};const sc=zd.score||0;const c=sc>=85?'#4ade80':sc>=70?'#FFD700':'#f87171';return(
          <div key={z} style={{borderRadius:12,padding:'12px 10px',textAlign:'center',background:`${c}12`,border:`1px solid ${c}30`}}>
            <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.5)',marginBottom:4}}>{z.toUpperCase()}</div>
            <div style={{fontSize:20,fontWeight:800,color:c,lineHeight:1}}>{sc||'—'}{sc?'%':''}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginTop:3}}>Audit Score</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.5)',marginTop:5}}>👥 {zd.partners||0} partners</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.5)'}}>🏪 {zd.showrooms||0} showrooms</div>
          </div>);
        })}
      </div>
    </div>

    {/* Pending actions + overdue tasks */}
    <div className="grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div style={{...css.glass,borderRadius:18,padding:18}}>
        <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:12}}>🎯 Pending Actions <span style={{fontSize:11,color:'#f87171',fontWeight:400}}>({openActions.length} open)</span></div>
        {openActions.length===0?<NoData h={80} msg="All actions resolved ✓"/>:openActions.slice(0,5).map(a=>(
          <div key={a.id} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:9,background:'rgba(255,255,255,.04)',marginBottom:6,border:`1px solid ${SEVERITY_COLORS[a.severity]||'rgba(255,255,255,.08)'}30`}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:SEVERITY_COLORS[a.severity]||'rgba(255,255,255,.3)',flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.title}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.4)'}}>{a.assignedTo} · Due {a.dueDate||'—'}</div>
            </div>
            <SeverityBadge severity={a.severity}/>
          </div>
        ))}
        {openActions.length>5&&<button onClick={()=>setActiveKPI('actions')} style={{...css.btnSm,width:'100%',marginTop:6,textAlign:'center'}}>View all {openActions.length} →</button>}
      </div>
      <div style={{...css.glass,borderRadius:18,padding:18}}>
        <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:12}}>✅ Overdue Tasks <span style={{fontSize:11,color:'#fb923c',fontWeight:400}}>({overdueTasks.length})</span></div>
        {overdueTasks.length===0?<NoData h={80} msg="No overdue tasks ✓"/>:overdueTasks.slice(0,5).map(t=>(
          <div key={t.id} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:9,background:'rgba(251,146,60,.06)',marginBottom:6,border:'1px solid rgba(251,146,60,.2)'}}>
            <span style={{fontSize:14}}>⚠️</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.taskName}</div>
              <div style={{fontSize:10,color:'#fb923c'}}>{t.assignedTo} · Was due {t.dueDate}</div>
            </div>
          </div>
        ))}
        {overdueTasks.length>5&&<button onClick={()=>setActiveKPI('tasks')} style={{...css.btnSm,width:'100%',marginTop:6,textAlign:'center'}}>View all {overdueTasks.length} →</button>}
      </div>
    </div>
  </div>);
}

/* ═══ ACTION CENTER ══════════════════════════════════════════ */
function ActionCenter({collections,addRecord,deleteRecord,updateRecord,perms,showToast}){
  const actions=useMemo(()=>[...getCol(collections,'ch_action_center')].sort((a,b)=>{const so={Critical:0,High:1,Medium:2,Low:3};return(so[a.severity]||3)-(so[b.severity]||3);}),[collections]);
  const[open,setOpen]=useState(false);const[saving,setSaving]=useState(false);
  const[filter,setFilter]=useState({status:'All',severity:'All',assignee:'All'});
  const[form,set,reset]=useForm({title:'',description:'',severity:'Medium',assignedTo:'',reviewer:'',escalationTo:TEAM_NAMES[0],sourceKPI:'',zone:'',dueDate:addDays(today(),7),remarks:''});

  const filtered=useMemo(()=>actions.filter(a=>{
    if(filter.status!=='All'&&a.status!==filter.status)return false;
    if(filter.severity!=='All'&&a.severity!==filter.severity)return false;
    if(filter.assignee!=='All'&&a.assignedTo!==filter.assignee)return false;
    return true;
  }),[actions,filter]);

  const stats=useMemo(()=>({
    open:actions.filter(a=>a.status==='Open').length,
    inProgress:actions.filter(a=>a.status==='In Progress').length,
    escalated:actions.filter(a=>a.status==='Escalated').length,
    closed:actions.filter(a=>a.status==='Closed').length,
    critical:actions.filter(a=>a.severity==='Critical'&&a.status!=='Closed').length,
  }),[actions]);

  const quickClose=async(id)=>{await updateRecord('ch_action_center',id,{status:'Closed',closedAt:new Date().toISOString()});};
  const escalate=async(id)=>{await updateRecord('ch_action_center',id,{status:'Escalated'});showToast('Action escalated','warning');};

  const add=async()=>{
    if(!chkForm(form,[['title','Title is required'],['assignedTo','Assigned to is required'],['dueDate','Due date is required']],showToast))return;
    setSaving(true);await addRecord('ch_action_center',{...form,status:'Open'},{ silent:false});showToast('Action created');reset();setOpen(false);setSaving(false);
  };

  const cols=[
    {key:'severity',label:'Severity',render:v=><SeverityBadge severity={v}/>},
    {key:'title',label:'Action Title',render:(v,r)=><div style={{maxWidth:220}}><div style={{fontSize:12,fontWeight:600,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)'}}>{r.sourceKPI?`KPI ${r.sourceKPI.replace('kpi','')} · `:''}{r.zone}</div></div>},
    {key:'status',label:'Status',render:v=><Badge status={v}/>},
    {key:'assignedTo',label:'Assigned To'},
    {key:'dueDate',label:'Due Date',render:v=>{const over=v&&new Date(v)<new Date();return<span style={{color:over?'#f87171':'rgba(255,255,255,.7)',fontWeight:over?700:400}}>{v||'—'}{over?' ⚠':''}</span>;}},
    {key:'_act',label:'Actions',render:(_,r)=><div style={{display:'flex',gap:5}}>
      {r.status!=='Closed'&&<button onClick={()=>quickClose(r.id)} style={{...css.btnSm,color:'#4ade80',fontSize:10}}>✓ Close</button>}
      {r.status==='Open'&&<button onClick={()=>escalate(r.id)} style={{...css.btnSm,color:'#f87171',fontSize:10}}>↑ Escalate</button>}
    </div>},
  ];

  return(<div style={{display:'flex',flexDirection:'column',gap:14}} className="fade-in">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
      <div>
        <h2 style={{fontSize:18,fontWeight:800,color:'#fff'}}>🎯 Action Center</h2>
        <p style={{fontSize:12,color:'rgba(255,255,255,.45)',marginTop:2}}>Track and resolve operational KPI failures</p>
      </div>
      {perms.canManageActions&&<button onClick={()=>setOpen(true)} style={{...css.btnP,display:'flex',alignItems:'center',gap:6}}>＋ New Action</button>}
    </div>

    <div className="grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
      {[['Open',stats.open,'#fb923c'],['In Progress',stats.inProgress,'#FFD700'],['Escalated',stats.escalated,'#f87171'],['Closed',stats.closed,'#4ade80']].map(([l,v,c])=>(
        <div key={l} style={{borderRadius:13,padding:'13px 15px',background:`${c}10`,border:`1px solid ${c}25`}}>
          <div style={{fontSize:22,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginTop:3}}>{l}</div>
        </div>
      ))}
    </div>

    {stats.critical>0&&<div style={{background:'rgba(248,113,113,.10)',border:'1px solid rgba(248,113,113,.35)',borderRadius:12,padding:'10px 14px',display:'flex',alignItems:'center',gap:8}}>
      <span className="pulse-critical" style={{width:10,height:10,borderRadius:'50%',background:'#f87171',display:'inline-block'}}/>
      <span style={{fontSize:13,fontWeight:700,color:'#f87171'}}>{stats.critical} critical action{stats.critical>1?'s':''} require immediate attention</span>
    </div>}

    {/* Filters */}
    <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
      {[['status',['All',...ACTION_STATUSES]],['severity',['All',...ACTION_SEVERITIES]],['assignee',['All',...TEAM_NAMES]]].map(([key,opts])=>(
        <div key={key} style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:'rgba(255,255,255,.45)',textTransform:'capitalize'}}>{key}:</span>
          <Sel value={filter[key]} onChange={v=>setFilter(f=>({...f,[key]:v}))} opts={opts}/>
        </div>
      ))}
      <span style={{fontSize:11,color:'rgba(255,255,255,.4)',alignSelf:'center'}}>{filtered.length} records</span>
    </div>

    <DTable cols={cols} data={filtered} onDelete={id=>deleteRecord('ch_action_center',id)} onEdit={(id, updated) => updateRecord('ch_action_center',id, updated)} perms={perms} pageSize={8}/>

    <Modal open={open} onClose={()=>setOpen(false)} title="Create New Action" wide>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div style={{gridColumn:'1/-1'}}><FF label="Action Title" required><input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Low Audit Score — Mumbai showroom" style={css.inp}/></FF></div>
        <div style={{gridColumn:'1/-1'}}><FF label="Description"><textarea value={form.description} onChange={e=>set('description',e.target.value)} rows={2} style={{...css.inp,resize:'vertical'}} placeholder="Describe the issue and expected resolution"/></FF></div>
        <FF label="Severity" required><Sel value={form.severity} onChange={v=>set('severity',v)} opts={ACTION_SEVERITIES}/></FF>
        <FF label="Source KPI"><Sel value={form.sourceKPI} onChange={v=>set('sourceKPI',v)} opts={[{v:'',l:'Select KPI'},...Array.from({length:16},(_,i)=>({v:`kpi${i+1}`,l:`KPI ${String(i+1).padStart(2,'0')}`}))]}/></FF>
        <FF label="Assigned To" required><TeamSel value={form.assignedTo} onChange={v=>set('assignedTo',v)}/></FF>
        <FF label="Reviewer"><TeamSel value={form.reviewer} onChange={v=>set('reviewer',v)}/></FF>
        <FF label="Escalation To"><TeamSel value={form.escalationTo} onChange={v=>set('escalationTo',v)}/></FF>
        <FF label="Zone"><Sel value={form.zone} onChange={v=>set('zone',v)} opts={[{v:'',l:'Select zone'},...ZONES]}/></FF>
        <FF label="Due Date" required><input type="date" value={form.dueDate} onChange={e=>set('dueDate',e.target.value)} style={css.inp}/></FF>
        <FF label="Remarks"><input value={form.remarks} onChange={e=>set('remarks',e.target.value)} style={css.inp}/></FF>
      </div>
      <div style={{display:'flex',gap:10,marginTop:16}}><button onClick={()=>setOpen(false)} style={{...css.btnG,flex:1}}>Cancel</button><button onClick={add} disabled={saving} style={{...css.btnP,flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>{saving&&<Spinner size={14}/>}Create Action</button></div>
    </Modal>
  </div>);
}

/* ═══ TASK MANAGER ═══════════════════════════════════════════ */
function TaskManager({collections,addRecord,deleteRecord,updateRecord,perms,showToast,auth}){
  const tasks=useMemo(()=>[...getCol(collections,'ch_tasks')].sort((a,b)=>{const po={Critical:0,High:1,Medium:2,Low:3};return(po[a.priority]||3)-(po[b.priority]||3);}),[collections]);
  const safeIsOverdue=t=>{try{return t.dueDate&&new Date(t.dueDate)<new Date()&&t.status!=='Done';}catch{return false;}};
  const[open,setOpen]=useState(false);const[saving,setSaving]=useState(false);
  const[filter,setFilter]=useState({status:'All',priority:'All',assignee:'All'});
  const[form,set,reset]=useForm({taskName:'',assignedTo:'',linkedKPI:'',linkedRecord:'',priority:'Medium',dueDate:addDays(today(),5),remarks:''});

  const filtered=useMemo(()=>tasks.filter(t=>{
    if(filter.status!=='All'&&t.status!==filter.status)return false;
    if(filter.priority!=='All'&&t.priority!==filter.priority)return false;
    if(filter.assignee!=='All'&&t.assignedTo!==filter.assignee)return false;
    return true;
  }),[tasks,filter]);

  const myTasks=(auth&&auth.user&&auth.user.name)?tasks.filter(t=>t.assignedTo===auth.user.name):[];
  const overdueTasks=tasks.filter(safeIsOverdue);
  const quickDone=async(id)=>{await updateRecord('ch_tasks',id,{status:'Done',completionDate:today()});};

  const add=async()=>{
    if(!chkForm(form,[['taskName','Task name is required'],['assignedTo','Assignee is required'],['dueDate','Due date is required']],showToast))return;
    setSaving(true);await addRecord('ch_tasks',{...form,status:'Open'});showToast('Task created');reset();setOpen(false);setSaving(false);
  };

  const cols=[
    {key:'priority',label:'Priority',render:v=><SeverityBadge severity={v}/>},
    {key:'taskName',label:'Task',render:(v,r)=><div style={{maxWidth:240}}><div style={{fontSize:12,fontWeight:600,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)'}}>{r.linkedKPI?`${r.linkedKPI} · `:''}{r.linkedRecord}</div></div>},
    {key:'assignedTo',label:'Assigned To'},
    {key:'status',label:'Status',render:v=><Badge status={v}/>},
    {key:'dueDate',label:'Due Date',render:v=>{const over=v&&new Date(v)<new Date();return<span style={{color:over?'#f87171':'rgba(255,255,255,.7)',fontWeight:over?700:400}}>{v||'—'}{over?' ⚠':''}</span>;}},
    {key:'_done',label:'',render:(_,r)=>r.status!=='Done'&&<button onClick={()=>quickDone(r.id)} style={{...css.btnSm,color:'#4ade80',fontSize:10}}>✓ Done</button>},
  ];

  return(<div style={{display:'flex',flexDirection:'column',gap:14}} className="fade-in">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
      <div><h2 style={{fontSize:18,fontWeight:800,color:'#fff'}}>✅ Task Manager</h2><p style={{fontSize:12,color:'rgba(255,255,255,.45)',marginTop:2}}>Operational tasks and follow-ups</p></div>
      {perms.canAdd&&<button onClick={()=>setOpen(true)} style={{...css.btnP,display:'flex',alignItems:'center',gap:6}}>＋ New Task</button>}
    </div>

    <div className="grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
      {[['Open',tasks.filter(t=>t.status==='Open').length,'#fb923c'],['In Progress',tasks.filter(t=>t.status==='In Progress').length,'#FFD700'],['Overdue',overdueTasks.length,'#f87171'],['Done',tasks.filter(t=>t.status==='Done').length,'#4ade80']].map(([l,v,c])=>(
        <div key={l} style={{borderRadius:13,padding:'13px 15px',background:`${c}10`,border:`1px solid ${c}25`}}>
          <div style={{fontSize:22,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginTop:3}}>{l}</div>
        </div>
      ))}
    </div>

    {auth.user&&myTasks.filter(t=>t.status!=='Done').length>0&&<div style={{...css.glass,borderRadius:14,padding:'12px 16px',border:'1px solid rgba(0,180,216,.2)'}}>

/* ═══ OVERVIEW ══════════════════════════════════════════════ */
function Overview({collections,setActiveKPI,kpiHealth,getTarget}){
  const f=getCol(collections,'ch_prospect_funnel'),sl=getCol(collections,'ch_shortlisted'),
    cft=getCol(collections,'ch_prospect_cft'),p=getCol(collections,'ch_partner_addition'),
    s=getCol(collections,'ch_showroom_addition'),aud=getCol(collections,'ch_showroom_audit'),
    crm=getCol(collections,'ch_crm_recovery'),cad=getCol(collections,'ch_cad_tat'),rnr=getCol(collections,'ch_rnr');
  const conv=f.filter(d=>d.status==='Converted').length,actP=p.filter(d=>d.status==='Active').length,openS=s.filter(d=>d.status==='Opened').length;
  const avgAud=avgOf(aud,'score'),cadDel=cad.filter(d=>d.tat!=null);
  const avgTAT=cadDel.length?(cadDel.reduce((s,d)=>s+(+d.tat||0),0)/cadDel.length).toFixed(1):0;
  const totalCRM=sumOf(crm,'amount'),totalCRMP=sumOf(crm,'monthPlan'),crmAch=safePct(totalCRM,totalCRMP);
  const funnel=[{label:'Prospects',value:f.length,color:'#00B4D8',id:'kpi1'},{label:'Shortlisted',value:sl.length,color:'#FFD700',id:'kpi2'},{label:'CFT Cleared',value:cft.filter(d=>d.result==='Pass').length,color:'#a78bfa',id:'kpi3'},{label:'Activated',value:actP,color:'#4ade80',id:'kpi4'}];
  const monthly=MONTHS.map(({m,p:px})=>({month:m,prospects:f.filter(d=>d.date?.startsWith(px)).length,partners:p.filter(d=>(d.onboardingDate||d.date)?.startsWith(px)).length,showrooms:s.filter(d=>(d.openingDate||d.date)?.startsWith(px)).length}));
  const crmTrend=MONTHS.map(({m,p:px})=>{const rows=crm.filter(d=>d.date?.startsWith(px));return{month:m,actual:+rows.reduce((s,r)=>s+(+r.amount||0),0).toFixed(1),plan:+rows.reduce((s,r)=>s+(+r.monthPlan||0),0).toFixed(1)};});
  const cards=[
    {id:'kpi1',e:'🎯',label:'Prospects',value:f.length,sub:`${conv} converted`,c:'#00B4D8'},
    {id:'kpi4',e:'🤝',label:'Partners Onboarded',value:p.length,sub:`${actP} active`,c:'#4ade80'},
    {id:'kpi6',e:'🏪',label:'Showrooms Launched',value:s.length,sub:`${openS} opened`,c:'#FFD700'},
    {id:'kpi3',e:'🧪',label:'CFT Cleared',value:cft.filter(d=>d.result==='Pass').length,sub:`of ${cft.length} CFTs`,c:'#a78bfa'},
    {id:'kpi8',e:'⭐',label:'Avg Audit Score',value:`${avgAud}%`,sub:`${aud.length} audits`,c:'#f472b6'},
    {id:'kpi10',e:'💹',label:'CRM Recovered',value:fmtLakhs(totalCRM),sub:`${crmAch}% of plan`,c:'#fb923c'},
    {id:'kpi16',e:'⏱',label:'Avg CAD TAT',value:`${avgTAT}d`,sub:`SLA ≤${KPI_CONFIG.cadTAT.target}d`,c:+avgTAT<=KPI_CONFIG.cadTAT.target?'#4ade80':'#f87171'},
    {id:'kpi9',e:'🏆',label:'R&R Awards',value:rnr.length,sub:'this period',c:'#FFD700'},
  ];
  const health=[
    {l:'Prospect→Conversion',pct:safePct(conv,f.length),target:KPI_CONFIG.prospectConversion.target,id:'kpi1'},
    {l:'CFT Pass Rate',pct:safePct(cft.filter(d=>d.result==='Pass').length,cft.length),target:KPI_CONFIG.cftPassRate.target,id:'kpi3'},
    {l:'Partner Activation',pct:safePct(actP,p.length),target:80,id:'kpi4'},
    {l:'Showroom Commissioning',pct:safePct(openS,s.length),target:85,id:'kpi6'},
    {l:'Audit Quality Score',pct:avgAud,target:KPI_CONFIG.auditScoreTarget.target,id:'kpi13'},
    {l:'CAD TAT SLA (≤4d)',pct:safePct(cadDel.filter(d=>+d.tat<=4).length,cadDel.length),target:KPI_CONFIG.feedbackAdherence.target,id:'kpi16'},
  ].map(k=>({...k,status:k.pct>=k.target?'on':k.pct>=k.target*.8?'warn':'crit'}));
  const[onC,wC,cC]=[health.filter(k=>k.status==='on').length,health.filter(k=>k.status==='warn').length,health.filter(k=>k.status==='crit').length];
  return(<div style={{display:'flex',flexDirection:'column',gap:16}} className="fade-in">
    <div style={{borderRadius:18,padding:'16px 20px',background:'linear-gradient(135deg,rgba(0,180,216,.14),rgba(0,180,216,.04))',border:'1px solid rgba(0,180,216,.22)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
      <div><div style={{fontSize:11,fontWeight:700,color:'#FFD700',marginBottom:4}}>⚡ Q4 2025 · Channel Management Network KPIs</div><div style={{fontSize:19,fontWeight:800,color:'#fff',marginBottom:4}}>Channel Performance Overview 🏗️</div><div style={{fontSize:12,color:'rgba(255,255,255,.5)'}}>{onC} On Track · {wC} Attention · {cC} Critical</div></div>
      <div style={{display:'flex',gap:20}}>{[[onC,'#4ade80','On Track'],[wC,'#FFD700','Attention'],[cC,'#f87171','Critical']].map(([v,c,l])=><div key={l} style={{textAlign:'center'}}><div style={{fontSize:26,fontWeight:800,color:c,lineHeight:1}}>{v}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)'}}>{l}</div></div>)}</div>
    </div>
    <div style={{...css.glass,borderRadius:18,padding:'16px 20px'}}>
      <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:3}}>🎯 Partner Activation Funnel</div>
      <div style={{fontSize:11,color:'rgba(255,255,255,.38)',marginBottom:14}}>Prospect → Shortlisted → CFT Cleared → Activated</div>
      <div style={{display:'flex'}}>
        {funnel.map((step,i)=>{const pct=!funnel[0].value?0:Math.round((step.value/funnel[0].value)*100),drop=i>0?funnel[i-1].value-step.value:0;return<div key={i} style={{flex:1}}><div onClick={()=>setActiveKPI(step.id)} style={{borderRadius:i===0?'10px 0 0 10px':i===funnel.length-1?'0 10px 10px 0':'0',padding:'13px 10px',textAlign:'center',cursor:'pointer',background:`${step.color}16`,border:`1px solid ${step.color}30`,borderLeft:i>0?'none':''}}><div style={{fontSize:24,fontWeight:800,color:step.color,lineHeight:1}}>{step.value}</div><div style={{fontSize:11,fontWeight:600,color:'#fff',marginTop:3}}>{step.label}</div><div style={{fontSize:10,color:step.color,marginTop:3}}>{pct}%{i>0?` · −${drop}`:''}</div></div></div>;})}
      </div>
    </div>
    <div className="grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
      {cards.map(card=><div key={card.id} onClick={()=>setActiveKPI(card.id)} style={{...css.glass,borderRadius:15,padding:'13px 15px',cursor:'pointer',border:`1px solid ${card.c}18`,position:'relative'}}>{kpiHealth[card.id]==='Critical'&&<span className="pulse-critical" style={{position:'absolute',top:8,right:8,width:8,height:8,borderRadius:'50%',background:'#f87171',display:'block'}}/>}<div style={{fontSize:20,marginBottom:7}}>{card.e}</div><div style={{fontSize:22,fontWeight:800,color:card.c,lineHeight:1}}>{card.value}</div><div style={{fontSize:12,fontWeight:600,color:'#fff',marginTop:2}}>{card.label}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:1}}>{card.sub}</div></div>)}
    </div>
    <div className="grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div style={{...css.glass,borderRadius:18,padding:18}}>
        <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:3}}>Monthly Channel Activity</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.35)',marginBottom:13}}>Oct – Dec 2025</div>
        <BarChartSVG data={monthly} bars={[{key:'prospects',label:'Prospects'},{key:'partners',label:'Partners'},{key:'showrooms',label:'Showrooms'}]} colors={['#00B4D8','#4ade80','#FFD700']}/>
      </div>
      <div style={{...css.glass,borderRadius:18,padding:18}}>
        <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:3}}>CRM Cost Recovery</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.35)',marginBottom:13}}>Plan vs Actual — ₹ Lakhs</div>
        <AreaChartSVG data={crmTrend} areas={[{key:'plan',label:'Plan (₹L)',dash:true},{key:'actual',label:'Actual (₹L)'}]} colors={['#FFD700','#00B4D8']} formatY={v=>`₹${v}L`}/>
      </div>
    </div>
    <div style={{...css.glass,borderRadius:18,padding:18}}>
      <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:14}}>KPI Health & SLA Status</div>
      <div className="grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {health.map(k=>{const dot=k.status==='on'?'#4ade80':k.status==='warn'?'#FFD700':'#f87171';return<div key={k.id} onClick={()=>setActiveKPI(k.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 13px',borderRadius:11,background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',cursor:'pointer'}}><div style={{width:9,height:9,borderRadius:'50%',background:dot,boxShadow:`0 0 7px ${dot}`,flexShrink:0}}/><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:'#fff',marginBottom:4}}>{k.l}</div><div style={{height:4,borderRadius:2,background:'rgba(255,255,255,.08)'}}><div style={{width:`${Math.min(k.pct,100)}%`,height:'100%',borderRadius:2,background:dot,transition:'width .6s'}}/></div></div><div style={{textAlign:'right',minWidth:46}}><div style={{fontSize:12,fontWeight:700,color:dot}}>{k.pct}%</div><div style={{fontSize:9,color:'rgba(255,255,255,.3)'}}>/{k.target}%</div></div><span style={{fontSize:12,color:'rgba(255,255,255,.2)'}}>→</span></div>;})}
      </div>
    </div>
  </div>);
}

  const onTime=delivered.filter(d=>+d.tat<=KPI_CONFIG.cadTAT.target).length,onTimePct=safePct(onTime,delivered.length);

  const zoneAvg=ZONES.map(z=>{const zd=delivered.filter(d=>d.zone===z);return{zone:z,avg:zd.length?+(zd.reduce((s,d)=>s+(+d.tat||0),0)/zd.length).toFixed(1):0};}).filter(z=>z.avg>0);
  const cols=[{key:'date',label:'Date'},{key:'projectName',label:'Project'},{key:'zone',label:'Zone'},{key:'requestDate',label:'Requested'},{key:'deliveryDate',label:'Delivered'},{key:'tat',label:'TAT',render:v=>v!=null?<span style={{fontWeight:700,color:+v<=KPI_CONFIG.cadTAT.target?'#4ade80':'#f87171'}}>{v}d {+v<=KPI_CONFIG.cadTAT.target?'✓':'⚠'}</span>:<span style={{color:'rgba(255,255,255,.3)'}}>In Progress</span>},{key:'designerName',label:'Designer'},{key:'status',label:'Status',render:v=><Badge status={v}/>}];

    <FYBand kpiId="kpi16" actual={data.length} getTarget={getTarget} color="#00B4D8"/>
    <G2 left={<><SL text={`TAT Trend — SLA ≤${KPI_CONFIG.cadTAT.target} days`}/><LineChartSVG data={tatTrend} lines={[{key:'tat',label:'TAT (days)'}]} xKey="date" colors={['#00B4D8']} refLine={KPI_CONFIG.cadTAT.target} refLabel={`SLA ${KPI_CONFIG.cadTAT.target}d`} formatY={v=>`${v}d`} height={180}/></>}
      right={<><SL text="Monthly SLA Adherence"/><BarChartSVG data={slaData} bars={[{key:'onTime',label:'On Time'},{key:'delayed',label:'Delayed'}]} colors={['#4ade80','#f87171']} height={140}/><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:12}}><div style={{borderRadius:11,padding:'11px',textAlign:'center',background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.2)'}}><div style={{fontSize:22,fontWeight:800,color:'#4ade80',lineHeight:1}}>{onTime}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:3}}>On Time (≤{KPI_CONFIG.cadTAT.target}d)</div></div><div style={{borderRadius:11,padding:'11px',textAlign:'center',background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.2)'}}><div style={{fontSize:22,fontWeight:800,color:'#f87171',lineHeight:1}}>{delivered.length-onTime}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:3}}>Delayed</div></div></div></>}/>

    </Modal>
  </KPICard>);

  const f=getFiltered('ch_prospect_funnel'),sl=getFiltered('ch_shortlisted'),cft=getFiltered('ch_prospect_cft'),p=getFiltered('ch_partner_addition'),s=getFiltered('ch_showroom_addition'),aud=getFiltered('ch_showroom_audit'),crm=getFiltered('ch_crm_recovery'),cad=getFiltered('ch_cad_tat'),surv=getFiltered('ch_partner_survey');

    case'leaderboard':return<Leaderboard collections={safeCollections}/>;

    case'kpi4':  return<KPI4  {...kp}/>;case'kpi5':  return<KPI5  {...kp}/>;case'kpi6':  return<KPI6  {...kp}/>;
    case'kpi7':  return<KPI7  {...kp}/>;case'kpi8':  return<KPI8  {...kp}/>;case'kpi9':  return<KPI9  {...kp}/>;
    case'kpi10': return<FinancialKPI {...kp} title="KPI 10 · CRM Cost Recovery" desc="Track CRM operating cost recovery" col="ch_crm_recovery" amtKey="amount" planKey="monthPlan" color="#00B4D8" isLakhs={true} addFields={F10} kpiId="kpi10"/>;
    case'kpi11': return<FinancialKPI {...kp} title="KPI 11 · CSE Salary Recovery" desc="Track CSE salary recovery from partners" col="ch_cse_salary" amtKey="amount" planKey="plan" color="#4ade80" isLakhs={false} extraCols={[{key:'cseName',label:'CSE Name'}]} addFields={F11} kpiId="kpi11"/>;
    case'kpi12': return<FinancialKPI {...kp} title="KPI 12 · Branding Cost Recovery" desc="Track partner co-branding cost recovery" col="ch_branding" amtKey="amount" planKey="plan" color="#f472b6" isLakhs={true} extraCols={[{key:'brandName',label:'Brand / Campaign'}]} addFields={F12} kpiId="kpi12"/>;
    case'kpi13': return<ScoreKPI {...kp} title="KPI 13 · Showroom Audit Quality Score (A & A+)" desc="Audit quality scores for A and A+ showrooms" col="ch_audit_score" scoreKey="auditScore" color="#4ade80" radarParams={R13} extraCols={[{key:'showroomName',label:'Showroom'}]} addFields={F13} kpiId="kpi13"/>;
    case'kpi14': return<ScoreKPI {...kp} title="KPI 14 · Partner Satisfaction Score (A & A+)" desc="Partner satisfaction survey scores" col="ch_partner_survey_score" scoreKey="surveyScore" color="#00B4D8" radarParams={R14} extraCols={[{key:'partnerName',label:'Partner'}]} addFields={F14} kpiId="kpi14"/>;
    case'kpi15': return<KPI15 {...kp}/>;
    case'kpi16': return<KPI16 {...kp}/>;
    default:     return<Overview collections={safeCollections} setActiveKPI={setActiveKPI} kpiHealth={safeKpiHealth} getTarget={getTarget}/>;
  }}

  return(<div style={{display:'flex',height:'100vh',overflow:'hidden',background:`radial-gradient(ellipse at 12% 22%,rgba(0,180,216,.08) 0%,transparent 50%),radial-gradient(ellipse at 88% 78%,rgba(255,215,0,.05) 0%,transparent 50%),#0A1628`,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
    {/* file:// protocol warning */}
    {isFileProtocol&&<div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:400,background:'rgba(255,215,0,.12)',borderTop:'1px solid rgba(255,215,0,.3)',padding:'6px 16px',display:'flex',alignItems:'center',gap:8,fontSize:11}}>
      <span style={{color:'#FFD700'}}>⚠️</span>
      <span style={{color:'rgba(255,255,255,.7)'}}>Running via <b>file://</b> — Firebase may be restricted. For full functionality host on <b>localhost</b> or a web server (e.g. VS Code Live Server).</span>
    </div>}
    {!isOnline&&<div style={{position:'fixed',top:0,left:0,right:0,zIndex:300,background:'rgba(239,68,68,.95)',color:'#fff',textAlign:'center',padding:'8px 16px',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>⚠️ You are offline — changes will sync when connection is restored</div>}

    <Sidebar active={activeKPI} setActive={setActiveKPI} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed} auth={auth} logout={logout} collections={safeCollections}/>

    <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden',marginTop:!isOnline?36:0}}>
      <Header active={activeKPI} auth={auth} dateRange={dateRange} setDateRange={setDateRange} selectedZone={selectedZone} setSelectedZone={setSelectedZone} isSyncing={isSyncing} lastSyncTime={lastSyncTime} refreshData={refreshData} exportCSV={exportCSV} compactMode={compactMode} setCompactMode={setCompactMode} collections={safeCollections}/>

      {isLoading&&<div style={{position:'absolute',inset:0,zIndex:90,background:'rgba(10,22,40,.85)',backdropFilter:'blur(4px)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}><Spinner size={38}/><div style={{fontSize:13,color:'rgba(255,255,255,.6)'}}>Loading data from Firestore…</div></div>}

      <main style={{flex:1,overflowY:'auto',padding:compactMode?'12px 14px':'18px 20px'}}>
        <div style={{maxWidth:1320,margin:'0 auto'}}>{renderPage()}</div>
      </main>

      <footer style={{flexShrink:0,padding:'5px 18px',borderTop:'1px solid rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
        <span style={{fontSize:10,color:'rgba(255,255,255,.18)'}}>AIS Windows · Channel Management KPI Command Center</span>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:10,color:isOnline?'rgba(74,222,128,.5)':'rgba(248,113,113,.5)',display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:isOnline?'#4ade80':'#f87171',display:'inline-block'}}/>{isOnline?'Live':'Offline'}
          </span>
          <span style={{fontSize:10,color:'rgba(255,255,255,.18)'}}>Internal dashboard — authenticated via Firebase</span>
        </div>
      </footer>
    </div>
    <Toast toast={toast}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppErrorBoundary>
    <App/>
  </AppErrorBoundary>
);
</script>
</body>
</html>
