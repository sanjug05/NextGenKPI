function chkForm(form,rules,showToast){
  for(const[k,msg,test]of rules){
    const v=form[k];

  }
  return true;

/* ═══ APP STATE WITH FULL FIRESTORE PERSISTENCE ════════════ */
function useAppState(){
  const[auth,setAuth]=useState({user:null,viewOnly:false,loading:true});
  const[activeKPI,setActiveKPI]=useState('overview');
  const[sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const[dateRange,setDateRange]=useState({start:'2025-10-01',end:'2025-12-31'});
  const[selectedZone,setSelectedZone]=useState('All');
  const[collections,setCollections]=useState(()=>ALL_COLS.reduce((a,k)=>({...a,[k]:[]}),{}));
  const[toast,setToast]=useState(null);
  const[isLoading,setIsLoading]=useState(false);
  const[isSyncing,setIsSyncing]=useState(false);
  const[lastSyncTime,setLastSyncTime]=useState(null);
  const[isOnline,setIsOnline]=useState(navigator.onLine);
  const collectionsRef=useRef(collections);
  collectionsRef.current=collections;

  /* Online/offline detection */
  useEffect(()=>{
    const on=()=>setIsOnline(true);
    const off=()=>setIsOnline(false);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);

  /* Keyboard shortcuts */
  useEffect(()=>{
    const h=(e)=>{
      if(e.ctrlKey&&e.key==='p'){e.preventDefault();window.print();}
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);

  const showToast=useCallback((msg,type='success')=>{
    setToast({msg,type,id:Date.now()});
    setTimeout(()=>setToast(null),3400);
  },[]);

  /* Seed Firestore if empty (runs once per project, gated by __app_meta__/seeded) */
  const seedIfEmpty=useCallback(async()=>{
    try{
      const flagRef=fbDb.collection('__app_meta__').doc('ch_seeded_v1');
      const flagSnap=await flagRef.get();
      if(flagSnap.exists){return;}
      setIsSyncing(true);
      for(const col of ALL_COLS){
        const snap=await fbDb.collection(col).limit(1).get();
        if(!snap.empty) continue;
        const rows=SEED[col]||[];
        if(!rows.length) continue;
        const BATCH_SIZE=400;
        for(let i=0;i<rows.length;i+=BATCH_SIZE){
          const batch=fbDb.batch();
          rows.slice(i,i+BATCH_SIZE).forEach(rec=>{
            batch.set(fbDb.collection(col).doc(rec.id),rec);
          });
          await batch.commit();
        }
      }
      await flagRef.set({seededAt:new Date().toISOString(),version:'ch_v1'});
    }catch(e){
      console.warn('Seed skipped:',e.message);
    }finally{
      setIsSyncing(false);
    }
  },[]);

  /* Load all 16 collections from Firestore */
  const loadAllCollections=useCallback(async(silent=false)=>{
    if(!silent) setIsLoading(true);
    else setIsSyncing(true);
    try{
      const snaps=await Promise.all(ALL_COLS.map(col=>fbDb.collection(col).get()));
      const fresh=ALL_COLS.reduce((acc,col,i)=>{
        acc[col]=snaps[i].docs.map(d=>({id:d.id,...d.data()}));
        return acc;
      },{});
      setCollections(fresh);
      setLastSyncTime(Date.now());
    }catch(e){
      showToast('Failed to load data from Firestore. Check connection.','error');
    }finally{
      setIsLoading(false);
      setIsSyncing(false);
    }
  },[showToast]);

  /* Firebase Auth listener */
  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(async(fbUser)=>{
      if(fbUser){
        try{
          const snap=await fbDb.collection('ch_managers').doc(fbUser.uid).get();
          const d=snap.exists?snap.data():{};
          const matched=TEAM.find(t=>
            t.name.toLowerCase()===(d.name||'').toLowerCase()||
            (fbUser.email||'').toLowerCase().startsWith(t.name.split(' ')[0].toLowerCase())
          );
          setAuth({
            user:{uid:fbUser.uid,email:fbUser.email,
              name:d.name||matched?.name||fbUser.displayName||fbUser.email,
              role:d.role||matched?.role||'Viewer',
              title:d.title||matched?.title||''},
            viewOnly:false,loading:false
          });
          await seedIfEmpty();
          await loadAllCollections(true);
        }catch(e){
          setAuth({user:{uid:fbUser.uid,email:fbUser.email,name:fbUser.displayName||fbUser.email,role:'Viewer',title:''},viewOnly:false,loading:false});
          await loadAllCollections(true);
        }
      }else{
        setAuth({user:null,viewOnly:false,loading:false});
      }
    });
    return()=>unsub();
  },[seedIfEmpty,loadAllCollections]);

  const loginEmail=useCallback(async(email,password)=>{
    await fbAuth.signInWithEmailAndPassword(email,password);
  },[]);

  const loginViewOnly=useCallback(async()=>{
    setAuth({user:{name:'Guest Viewer',role:'Viewer',title:''},viewOnly:true,loading:false});
    await loadAllCollections(true);
  },[loadAllCollections]);

  const logout=useCallback(async()=>{
    if(!auth.viewOnly) await fbAuth.signOut();
    setAuth({user:null,viewOnly:false,loading:false});
    setCollections(ALL_COLS.reduce((a,k)=>({...a,[k]:[]}),{}));
  },[auth.viewOnly]);

  const perms=useMemo(()=>ROLE_PERMS[auth.user?.role]??ROLE_PERMS.Viewer,[auth.user?.role]);

  /* addRecord — optimistic update + Firestore write */
  const addRecord=useCallback(async(col,data)=>{
    const rec={...data,id:genId(),createdAt:new Date().toISOString()};
    setCollections(prev=>({...prev,[col]:[...(prev[col]||[]),rec]}));
    try{
      await fbDb.collection(col).doc(rec.id).set(rec);
      setLastSyncTime(Date.now());
      return rec;
    }catch(e){
      setCollections(prev=>({...prev,[col]:(prev[col]||[]).filter(r=>r.id!==rec.id)}));
      showToast('Failed to save. Please try again.','error');
      return null;
    }
  },[showToast]);

  /* deleteRecord — confirm + optimistic + Firestore delete */
  const deleteRecord=useCallback(async(col,id)=>{
    if(!window.confirm('Remove this record? This action cannot be undone.')) return;
    const backup=collectionsRef.current[col]?.find(r=>r.id===id);
    setCollections(prev=>({...prev,[col]:(prev[col]||[]).filter(r=>r.id!==id)}));
    try{
      await fbDb.collection(col).doc(id).delete();
      showToast('Record removed','neutral');
      setLastSyncTime(Date.now());
    }catch(e){
      if(backup) setCollections(prev=>({...prev,[col]:[...(prev[col]||[]),backup]}));
      showToast('Failed to delete. Please try again.','error');
    }
  },[showToast]);

  const refreshData=useCallback(()=>loadAllCollections(false),[loadAllCollections]);

  /* CSV export of all visible filtered data */
  const exportCSV=useCallback(()=>{
    try{
      const rows=[['Collection','Date','Zone','Name/Partner','Status/Result','Remarks']];
      ALL_COLS.forEach(col=>{
        (collectionsRef.current[col]||[]).forEach(rec=>{
          const df=COL_META[col]?.dateField||'date';
          rows.push([
            col,rec[df]||rec.date||'',rec.zone||'',
            rec.prospectName||rec.partnerName||rec.showroomName||rec.projectName||rec.cseName||rec.brandName||rec.recipientName||'',
            rec.status||rec.result||rec.adherenceStatus||'',
            rec.remarks||''
          ]);
        });
      });
      const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`AIS_Channel_KPI_${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);URL.revokeObjectURL(url);
      showToast('CSV exported successfully');
    }catch(e){showToast('Export failed','error');}
  },[showToast]);

  const getFiltered=useCallback((col)=>{
    const df=COL_META[col]?.dateField||'date';
    let data=collections[col]||[];
    if(dateRange.start) data=data.filter(r=>{const d=r[df]||r.date||'';return d>=dateRange.start;});
    if(dateRange.end)   data=data.filter(r=>{const d=r[df]||r.date||'';return!d||d<=dateRange.end;});
    if(selectedZone!=='All') data=data.filter(r=>r.zone===selectedZone);
    return[...data].sort((a,b)=>{const da=a[df]||a.date||'',db=b[df]||b.date||'';return db.localeCompare(da);});
  },[collections,dateRange,selectedZone]);

  return{auth,loginEmail,loginViewOnly,logout,perms,
    activeKPI,setActiveKPI,sidebarCollapsed,setSidebarCollapsed,
    dateRange,setDateRange,selectedZone,setSelectedZone,
    addRecord,deleteRecord,getFiltered,showToast,toast,
    isLoading,isSyncing,lastSyncTime,isOnline,
    refreshData,exportCSV};
}

function useForm(init){
  const[form,setForm]=useState(init);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const reset=()=>setForm(init);
  return[form,set,reset];
}

function BarChartSVG({data,bars,xKey='month',height=175,colors,formatY,refLine}){
  const[tip,setTip]=useState(null);
  const C=colors||['#00B4D8','rgba(255,255,255,.12)','#4ade80','#FFD700'];
  if(!data?.length)return <NoData h={height}/>;
  const VW=420,VH=height,P={t:10,r:8,b:32,l:44};
  const cW=VW-P.l-P.r,cH=VH-P.t-P.b;
  const allV=data.flatMap(d=>bars.map(b=>+(d[b.key]||0)));
  const maxV=Math.max(...allV,1)*1.18;
  const gW=cW/data.length;
  const bW=Math.min((gW*.72)/bars.length-1,32);
  const Y=v=>P.t+cH*(1-v/maxV);
  return(<div style={{position:'relative',userSelect:'none'}}>
    <svg viewBox={`0 0 ${VW} ${VH}`} width="100%" height={height}>
      {[0,.25,.5,.75,1].map(p=>{const v=maxV*p,y=Y(v);return(<g key={p}><line x1={P.l} x2={P.l+cW} y1={y} y2={y} stroke="rgba(255,255,255,.06)" strokeWidth=".6"/><text x={P.l-3} y={y+3.5} textAnchor="end" fill="rgba(255,255,255,.35)" fontSize="8">{formatY?formatY(v):v>=1000?(v/1000).toFixed(1)+'K':Math.round(v)}</text></g>);})}
      {refLine!=null&&<line x1={P.l} x2={P.l+cW} y1={Y(refLine)} y2={Y(refLine)} stroke="#FFD700" strokeWidth="1.5" strokeDasharray="5,3"/>}
      {data.map((d,di)=>{const gX=P.l+di*gW,bGW=bW*bars.length+(bars.length-1)*2,sX=gX+(gW-bGW)/2;
        return(<g key={di} onMouseEnter={()=>setTip({di,d})} onMouseLeave={()=>setTip(null)}>
          <rect x={gX} y={P.t} width={gW} height={cH} fill="transparent"/>
          {bars.map((b,bi)=>{const v=+(d[b.key]||0),bH=(v/maxV)*cH;return(<rect key={bi} x={sX+bi*(bW+2)} y={Y(v)} width={bW} height={Math.max(bH,0)} fill={C[bi%C.length]} rx="2"/>);})}
          <text x={gX+gW/2} y={VH-6} textAnchor="middle" fill="rgba(255,255,255,.38)" fontSize="9">{String(d[xKey]??di).slice(0,7)}</text>
        </g>);})}
      <line x1={P.l} x2={P.l} y1={P.t} y2={P.t+cH} stroke="rgba(255,255,255,.1)" strokeWidth=".6"/>
    </svg>
    {tip&&<div style={{...TIP_S,top:4,left:`calc(${(tip.di+.5)/data.length*100}% - 64px)`}}>
      <div style={{fontWeight:700,marginBottom:4,paddingBottom:3,borderBottom:'1px solid rgba(255,255,255,.1)'}}>{tip.d[xKey]}</div>
      {bars.map((b,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',gap:10,color:C[i%C.length]}}><span>{b.label??b.key}</span><b>{formatY?formatY(+(tip.d[b.key]||0)):tip.d[b.key]??0}</b></div>)}
    </div>}
  </div>);
}

function AreaChartSVG({data,areas,xKey='month',height=175,colors,formatY}){
  const[tip,setTip]=useState(null);
  const C=colors||['#00B4D8','#FFD700'];
  if(!data?.length)return <NoData h={height}/>;
  const VW=420,VH=height,P={t:10,r:8,b:32,l:44};
  const cW=VW-P.l-P.r,cH=VH-P.t-P.b;
  const allV=data.flatMap(d=>areas.map(a=>+(d[a.key]||0)));
  const maxV=Math.max(...allV,1)*1.18;
  const n=data.length,X=i=>P.l+(n<=1?cW/2:i*cW/(n-1)),Y=v=>P.t+cH*(1-v/maxV);
  const mkP=key=>data.map((d,i)=>`${i===0?'M':'L'}${X(i)},${Y(+(d[key]||0))}`).join(' ');
  const mkA=key=>{const l=n-1;return`${mkP(key)} L${X(l)},${P.t+cH} L${X(0)},${P.t+cH} Z`;};
  return(<div style={{position:'relative',userSelect:'none'}}>
    <svg viewBox={`0 0 ${VW} ${VH}`} width="100%" height={height}>
      <defs>{areas.map((a,i)=><linearGradient key={i} id={`ag${i}${a.key}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C[i]||'#00B4D8'} stopOpacity=".3"/><stop offset="100%" stopColor={C[i]||'#00B4D8'} stopOpacity="0"/></linearGradient>)}</defs>
      {[0,.25,.5,.75,1].map(p=>{const v=maxV*p,y=Y(v);return(<g key={p}><line x1={P.l} x2={P.l+cW} y1={y} y2={y} stroke="rgba(255,255,255,.06)" strokeWidth=".6"/><text x={P.l-3} y={y+3.5} textAnchor="end" fill="rgba(255,255,255,.35)" fontSize="8">{formatY?formatY(v):Math.round(v)}</text></g>);})}
      {areas.map((a,i)=><g key={i}><path d={mkA(a.key)} fill={`url(#ag${i}${a.key})`}/><path d={mkP(a.key)} fill="none" stroke={C[i]||'#00B4D8'} strokeWidth="2" strokeLinejoin="round" strokeDasharray={a.dash?'5,3':undefined}/></g>)}
      {data.map((d,i)=><rect key={i} x={X(i)-(n<=1?cW/2:cW/(2*(n-1)))} y={P.t} width={n<=1?cW:cW/(n-1)} height={cH} fill="transparent" onMouseEnter={()=>setTip({i,d})} onMouseLeave={()=>setTip(null)}/>)}
      {data.map((d,i)=><text key={i} x={X(i)} y={VH-6} textAnchor="middle" fill="rgba(255,255,255,.38)" fontSize="9">{String(d[xKey]??i).slice(0,7)}</text>)}
      <line x1={P.l} x2={P.l} y1={P.t} y2={P.t+cH} stroke="rgba(255,255,255,.1)" strokeWidth=".6"/>
    </svg>
    {tip&&<div style={{...TIP_S,top:4,left:`calc(${n<=1?50:tip.i/(n-1)*100}% - 60px)`}}>
      <div style={{fontWeight:700,marginBottom:4,paddingBottom:3,borderBottom:'1px solid rgba(255,255,255,.1)'}}>{tip.d[xKey]}</div>
      {areas.map((a,i)=><div key={i} style={{color:C[i]||'#00B4D8'}}>{a.label??a.key}: <b>{formatY?formatY(+(tip.d[a.key]||0)):tip.d[a.key]??0}</b></div>)}
    </div>}
  </div>);
}

function LineChartSVG({data,lines,xKey='date',height=180,colors,formatY,refLine,refLabel}){
  const[tip,setTip]=useState(null);
  const C=colors||['#00B4D8'];
  if(!data?.length)return <NoData h={height}/>;

  const cW=VW-P.l-P.r,cH=VH-P.t-P.b;
  const allV=data.flatMap(d=>lines.map(l=>+(d[l.key]||0)));
  const maxV=Math.max(...allV,refLine||0,1)*1.18;
  const n=data.length,X=i=>P.l+(n<=1?cW/2:i*cW/(n-1)),Y=v=>P.t+cH*(1-v/maxV);
  return(<div style={{position:'relative',userSelect:'none'}}>
    <svg viewBox={`0 0 ${VW} ${VH}`} width="100%" height={height}>
      {[0,.25,.5,.75,1].map(p=>{const v=maxV*p,y=Y(v);return(<g key={p}><line x1={P.l} x2={P.l+cW} y1={y} y2={y} stroke="rgba(255,255,255,.06)" strokeWidth=".6"/><text x={P.l-3} y={y+3.5} textAnchor="end" fill="rgba(255,255,255,.35)" fontSize="8">{formatY?formatY(v):Math.round(v)}</text></g>);})}
      {refLine!=null&&<><line x1={P.l} x2={P.l+cW} y1={Y(refLine)} y2={Y(refLine)} stroke="#FFD700" strokeWidth="1.5" strokeDasharray="5,3"/>{refLabel&&<text x={P.l+cW-2} y={Y(refLine)-4} textAnchor="end" fill="#FFD700" fontSize="8">{refLabel}</text>}</>}
      {lines.map((l,li)=>{const pts=data.map((d,i)=>`${i===0?'M':'L'}${X(i)},${Y(+(d[l.key]||0))}`).join(' ');return(<g key={li}><path d={pts} fill="none" stroke={C[li]||'#00B4D8'} strokeWidth="2" strokeLinejoin="round"/>{data.map((d,i)=><circle key={i} cx={X(i)} cy={Y(+(d[l.key]||0))} r="3.5" fill={C[li]||'#00B4D8'} stroke="#0A1628" strokeWidth="1.5"/>)}</g>);})}
      {data.map((d,i)=><g key={i}><rect x={X(i)-(n<=1?cW/2:cW/(2*(n-1)))} y={P.t} width={n<=1?cW:cW/(n-1)} height={cH} fill="transparent" onMouseEnter={()=>setTip({i,d})} onMouseLeave={()=>setTip(null)}/><text x={X(i)} y={VH-6} textAnchor="middle" fill="rgba(255,255,255,.38)" fontSize="8">{String(d[xKey]??i).slice(-5)}</text></g>)}
      <line x1={P.l} x2={P.l} y1={P.t} y2={P.t+cH} stroke="rgba(255,255,255,.1)" strokeWidth=".6"/>
    </svg>
    {tip&&<div style={{...TIP_S,top:4,left:`calc(${n<=1?50:tip.i/(n-1)*100}% - 60px)`}}>
      <div style={{fontWeight:700,marginBottom:4,paddingBottom:3,borderBottom:'1px solid rgba(255,255,255,.1)'}}>{tip.d[xKey]}</div>
      {lines.map((l,i)=><div key={i} style={{color:C[i]||'#00B4D8'}}>{l.label??l.key}: <b>{formatY?formatY(+(tip.d[l.key]||0)):tip.d[l.key]??0}</b></div>)}
    </div>}
  </div>);
}

function DonutChartSVG({data,labelKey='name',valueKey='value',colors,height=185}){
  const[tip,setTip]=useState(null);
  const pal=colors||['#00B4D8','#4ade80','#FFD700','#f472b6','#a78bfa','#fb923c'];
  const total=data.reduce((s,d)=>s+(+(d[valueKey]||0)),0);
  if(!total)return <NoData h={height}/>;
  const VW=220,VH=height,cx=VW/2,cy=VH/2,R=Math.min(VW,VH)/2-18,ri=R*.55;
  let ang=-Math.PI/2;
  const slices=data.map((d,i)=>{const v=+(d[valueKey]||0);if(!v)return null;
    const sw=(v/total)*2*Math.PI,a1=ang,a2=ang+sw;ang=a2;
    const arc=(r,a)=>({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});
    const{x:ox1,y:oy1}=arc(R,a1),{x:ox2,y:oy2}=arc(R,a2),{x:ix1,y:iy1}=arc(ri,a1),{x:ix2,y:iy2}=arc(ri,a2);
    const lg=sw>Math.PI?1:0;
    return{d,i,v,pct:Math.round(v/total*100),path:`M${ix1},${iy1} L${ox1},${oy1} A${R},${R} 0 ${lg} 1 ${ox2},${oy2} L${ix2},${iy2} A${ri},${ri} 0 ${lg} 0 ${ix1},${iy1} Z`};
  }).filter(Boolean);
  return(<div style={{position:'relative',userSelect:'none',display:'flex',justifyContent:'center'}}>
    <svg viewBox={`0 0 ${VW} ${VH}`} width={VW} height={VH}>
      {slices.map(s=><path key={s.i} d={s.path} fill={pal[s.i%pal.length]} stroke="rgba(10,22,40,.5)" strokeWidth="1.2" onMouseEnter={()=>setTip(s)} onMouseLeave={()=>setTip(null)} style={{opacity:tip&&tip.i!==s.i?.75:1,cursor:'default'}}/>)}
      <text x={cx} y={cy-4} textAnchor="middle" fill="#fff" fontSize="16" fontWeight="700">{total}</text>
      <text x={cx} y={cy+12} textAnchor="middle" fill="rgba(255,255,255,.4)" fontSize="8">Total</text>
    </svg>
    {tip&&<div style={{...TIP_S,top:'25%',left:'50%',transform:'translateX(-50%)'}}><b>{tip.d[labelKey]}</b>: {tip.v} ({tip.pct}%)</div>}
  </div>);
}

function RadarChartSVG({data,dataKey='value',labelKey='subject',color='#00B4D8',height=210}){
  if(!data?.length)return <NoData h={height}/>;
  const VW=240,VH=height,cx=VW/2,cy=VH/2,R=Math.min(VW,VH)/2-28;
  const n=data.length,max=Math.max(...data.map(d=>+(d[dataKey]||0)),1);
  const ang=i=>(i/n)*2*Math.PI-Math.PI/2;
  const pt=(i,v)=>{const a=ang(i),r=(v/max)*R;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};};
  const lpt=i=>{const a=ang(i);return{x:cx+(R+20)*Math.cos(a),y:cy+(R+20)*Math.sin(a)};};
  const gPath=p=>data.map((_,i)=>{const{x,y}=pt(i,max*p);return`${i===0?'M':'L'}${x},${y}`;}).join(' ')+' Z';
  const vPath=data.map((d,i)=>{const{x,y}=pt(i,+(d[dataKey]||0));return`${i===0?'M':'L'}${x},${y}`;}).join(' ')+' Z';
  return(<svg viewBox={`0 0 ${VW} ${VH}`} width="100%" height={height}>
    {[.25,.5,.75,1].map(p=><path key={p} d={gPath(p)} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth=".6"/>)}
    {data.map((_,i)=>{const{x,y}=pt(i,max);return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(255,255,255,.08)" strokeWidth=".6"/>;}) }
    <path d={vPath} fill={color} fillOpacity=".15" stroke={color} strokeWidth="1.8"/>
    {data.map((d,i)=>{const{x,y}=pt(i,+(d[dataKey]||0));return<circle key={i} cx={x} cy={y} r="3" fill={color}/>;}) }
    {data.map((d,i)=>{const{x,y}=lpt(i);return<text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill="rgba(255,255,255,.55)" fontSize="8">{d[labelKey]}</text>;}) }
  </svg>);
}

function Gauge({value,max=100,label,color='#00B4D8',size=155}){
  const pct=Math.min(value/max,1),r=(size-24)/2,cx=size/2,cy=size/2;
  const st=Math.PI*.75,en=Math.PI*2.25;
  const xy=(a,rad)=>({x:cx+rad*Math.cos(a),y:cy+rad*Math.sin(a)});
  const s=xy(st,r),e=xy(en,r),v=xy(st+pct*(en-st),r);
  const lg=(en-st)>Math.PI,lv=(pct*(en-st))>Math.PI;
  return(<div style={{textAlign:'center'}}>
    <svg width={size} height={size*.73} viewBox={`0 0 ${size} ${size}`} style={{overflow:'visible'}}>
      <path d={`M${s.x},${s.y} A${r},${r} 0 ${lg?1:0} 1 ${e.x},${e.y}`} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="10" strokeLinecap="round"/>
      {pct>0&&<path d={`M${s.x},${s.y} A${r},${r} 0 ${lv?1:0} 1 ${v.x},${v.y}`} fill="none" stroke={color} strokeWidth="10" strokeLinecap="round" style={{filter:`drop-shadow(0 0 5px ${color}90)`}}/>}
      <text x={cx} y={cy+11} textAnchor="middle" fill="#fff" fontSize="19" fontWeight="700">{Math.round(value)}{max===100?'%':''}</text>
    </svg>
    {label&&<div style={{fontSize:11,color:'rgba(255,255,255,.5)',marginTop:1}}>{label}</div>}
  </div>);
}

function AchBar({value,plan}){const p=plan>0?Math.min((value/plan)*100,120):0,c=p>=100?'#4ade80':p>=80?'#FFD700':'#f87171';return<div style={{display:'flex',alignItems:'center',gap:7}}><div style={{flex:1,height:5,borderRadius:3,background:'rgba(255,255,255,.08)'}}><div style={{width:`${Math.min(p,100)}%`,height:'100%',borderRadius:3,background:c}}/></div><span style={{fontSize:11,fontWeight:700,color:c,minWidth:36}}>{Math.round(p)}%</span></div>;}
function FF({label,children,required}){return<div><div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,.45)',marginBottom:5}}>{label}{required&&<span style={{color:'#f87171'}}> *</span>}</div>{children}</div>;}
function Sel({value,onChange,opts}){return<select value={value} onChange={e=>onChange(e.target.value)} style={{...css.inp,appearance:'none',cursor:'pointer'}}>{opts.map(o=>typeof o==='string'?<option key={o} value={o}>{o}</option>:<option key={o.v} value={o.v}>{o.l}</option>)}</select>;}

function SL({text}){return<div style={{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:'rgba(255,255,255,.35)',marginBottom:9,textTransform:'uppercase'}}>{text}</div>;}
function G2({left,right}){return<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:18}}><div>{left}</div><div>{right}</div></div>;}

function DTable({cols,data,onDelete,perms}){
  const[pg,setPg]=useState(0);const PS=7,pages=Math.ceil(data.length/PS),rows=data.slice(pg*PS,(pg+1)*PS);
  if(!data.length)return<div style={{textAlign:'center',padding:'26px 0',color:'rgba(255,255,255,.28)'}}><div style={{fontSize:24,marginBottom:6}}>📋</div><p style={{fontSize:12}}>No records in selected range</p></div>;
  return<div><div className="tbl-wrap"><table style={{width:'100%',borderCollapse:'collapse',minWidth:520}}><thead><tr>{cols.map(c=><th key={c.key} style={{textAlign:'left',padding:'9px 13px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'rgba(255,255,255,.4)',background:'rgba(0,180,216,.07)',whiteSpace:'nowrap'}}>{c.label}</th>)}{perms?.canDelete&&<th style={{padding:'9px 13px',background:'rgba(0,180,216,.07)'}}/>}</tr></thead><tbody>{rows.map((row,i)=><tr key={row.id||i} style={{borderBottom:'1px solid rgba(255,255,255,.05)'}}>{cols.map(c=><td key={c.key} style={{padding:'9px 13px',fontSize:12,color:'rgba(255,255,255,.78)',whiteSpace:'nowrap'}}>{c.render?c.render(row[c.key],row):(row[c.key]??'—')}</td>)}{perms?.canDelete&&onDelete&&<td style={{padding:'9px 13px'}}><button onClick={()=>onDelete(row.id)} style={css.btnD}>Remove</button></td>}</tr>)}</tbody></table></div>
  {pages>1&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10}}><span style={{fontSize:11,color:'rgba(255,255,255,.35)'}}>Showing {pg*PS+1}–{Math.min((pg+1)*PS,data.length)} of {data.length}</span><div style={{display:'flex',gap:4}}>{[...Array(pages)].map((_,i)=><button key={i} onClick={()=>setPg(i)} style={{width:27,height:27,borderRadius:7,border:'none',cursor:'pointer',fontWeight:700,fontSize:12,background:pg===i?'#00B4D8':'rgba(255,255,255,.06)',color:pg===i?'#fff':'rgba(255,255,255,.5)'}}>{i+1}</button>)}</div></div>}
  </div>;
}

function Modal({open,onClose,title,children}){
  useEffect(()=>{if(!open)return;const h=e=>{if(e.key==='Escape')onClose();};document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h);},[open,onClose]);
  if(!open)return null;
  return<div role="dialog" aria-modal="true" onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',backdropFilter:'blur(4px)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}><div style={{...css.glassMd,borderRadius:18,width:'100%',maxWidth:540,maxHeight:'88vh',overflowY:'auto',boxShadow:'0 30px 100px rgba(0,0,0,.6)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 20px',borderBottom:'1px solid rgba(255,255,255,.08)'}}><span style={{fontWeight:700,fontSize:15,color:'#fff'}}>{title}</span><button onClick={onClose} style={{...css.btnG,padding:'4px 10px',fontSize:16,lineHeight:1}}>✕</button></div><div style={{padding:20}}>{children}</div></div></div>;
}

function KPICard({title,desc,metrics,onAdd,perms,children}){
  const[collapsed,setCollapsed]=useState(false);
  return<div style={{...css.glass,borderRadius:18,overflow:'hidden',marginBottom:16}}><div onClick={()=>setCollapsed(!collapsed)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'15px 20px',cursor:'pointer',borderBottom:collapsed?'none':'1px solid rgba(255,255,255,.07)'}}><div><div style={{fontWeight:700,fontSize:14,color:'#fff',marginBottom:2}}>{title}</div>{desc&&<div style={{fontSize:11,color:'rgba(255,255,255,.38)'}}>{desc}</div>}</div><div style={{display:'flex',alignItems:'center',gap:12}} onClick={e=>e.stopPropagation()}>{metrics?.map((m,i)=><div key={i} style={{textAlign:'right'}}><div style={{fontSize:19,fontWeight:800,color:m.color||'#00B4D8',lineHeight:1}}>{m.value}</div><div style={{fontSize:10,color:'rgba(255,255,255,.38)'}}>{m.label}</div></div>)}{perms?.canAdd&&onAdd&&<button onClick={onAdd} style={{...css.btnP,display:'flex',alignItems:'center',gap:5,padding:'6px 12px',fontSize:12}}>＋ Add</button>}<span style={{color:'rgba(255,255,255,.3)',fontSize:14}}>{collapsed?'▶':'▼'}</span></div></div>{!collapsed&&<div style={{padding:20}}>{children}</div>}</div>;
}

function Toast({toast}){
  if(!toast)return null;
  const st={success:{bg:'rgba(13,31,60,.97)',border:'rgba(0,180,216,.4)',icon:'✅'},error:{bg:'rgba(60,13,13,.97)',border:'rgba(248,113,113,.4)',icon:'❌'},neutral:{bg:'rgba(30,30,50,.97)',border:'rgba(255,255,255,.2)',icon:'🗑'}}[toast.type]||{bg:'rgba(13,31,60,.97)',border:'rgba(0,180,216,.4)',icon:'✅'};
  return<div key={toast.id} role="alert" aria-live="polite" style={{position:'fixed',bottom:24,right:24,zIndex:200,background:st.bg,border:`1px solid ${st.border}`,borderRadius:12,padding:'11px 17px',display:'flex',alignItems:'center',gap:9,color:'#fff',fontSize:13,fontWeight:600,boxShadow:'0 8px 30px rgba(0,0,0,.45)',animation:'slideUp .3s ease'}}><span style={{fontSize:16}}>{st.icon}</span>{toast.msg}</div>;
}


/* ═══ AUTH PAGE ════════════════════════════════════════════ */
function AuthPage({onLogin,onViewOnly}){
  const[email,setEmail]=useState('');const[pass,setPass]=useState('');
  const[sp,setSp]=useState(false);const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const doLogin=async(e)=>{e.preventDefault();setErr('');setLoading(true);
    try{await onLogin(email,pass);}
    catch(ex){setErr(ex.code==='auth/invalid-credential'||ex.code==='auth/wrong-password'||ex.code==='auth/user-not-found'?'Invalid email or password.':ex.code==='auth/invalid-email'?'Enter a valid email.':ex.code==='auth/too-many-requests'?'Too many attempts. Try later.':'Sign-in failed. Check your credentials.');}
    setLoading(false);};
  return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:`radial-gradient(ellipse at 12% 22%,rgba(0,180,216,.10) 0%,transparent 50%),radial-gradient(ellipse at 88% 78%,rgba(255,215,0,.07) 0%,transparent 50%),#0A1628`,padding:16}}>
    <div style={{width:'100%',maxWidth:400}}>
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{width:60,height:60,borderRadius:16,background:'rgba(0,180,216,.15)',border:'1px solid rgba(0,180,216,.4)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',fontSize:26}}>🏗️</div>
        <div style={{fontSize:22,fontWeight:800,color:'#fff',letterSpacing:'-.5px'}}>AIS Channel KPI</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:3}}>Channel Management Dashboard</div>
      </div>
      <div style={{...css.glassMd,borderRadius:20,padding:'24px 24px 20px',boxShadow:'0 24px 80px rgba(0,0,0,.45)'}}>
        <form onSubmit={doLogin} style={{display:'flex',flexDirection:'column',gap:13}}>
          <FF label="Email Address" required>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@aisglass.com" autoComplete="email" style={css.inp} required/>
          </FF>
          <FF label="Password" required>
            <div style={{position:'relative'}}>
              <input type={sp?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" autoComplete="current-password" style={{...css.inp,paddingRight:40}} required/>
              <button type="button" onClick={()=>setSp(!sp)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,.4)',fontSize:15}}>{sp?'🙈':'👁'}</button>
            </div>
          </FF>
          {err&&<div style={{color:'#f87171',fontSize:12,background:'rgba(239,68,68,.10)',borderRadius:8,padding:'9px 12px',border:'1px solid rgba(248,113,113,.25)'}}>{err}</div>}
          <button type="submit" disabled={loading} style={{...css.btnP,padding:'11px',display:'flex',alignItems:'center',justifyContent:'center',gap:8,opacity:loading?.7:1}}>
            {loading?<><Spinner size={16}/> Signing in…</>:<><span>🔐</span> Sign In</>}
          </button>
        </form>
        <div style={{margin:'16px 0',display:'flex',alignItems:'center',gap:10}}><div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/><span style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>or</span><div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/></div>
        <button onClick={onViewOnly} style={{width:'100%',background:'rgba(255,215,0,.09)',border:'1px solid rgba(255,215,0,.3)',color:'#FFD700',borderRadius:12,padding:'11px',cursor:'pointer',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>🛡 View Without Login (Read-Only)</button>
      </div>
      <div style={{textAlign:'center',marginTop:14,fontSize:11,color:'rgba(255,255,255,.2)'}}>Internal dashboard · Authenticated via Firebase</div>
    </div>
  </div>);
}

/* ═══ OVERVIEW ══════════════════════════════════════════════ */
function Overview({getFiltered,setActiveKPI}){
  const f=getFiltered('ch_prospect_funnel'),sl=getFiltered('ch_shortlisted'),
    cft=getFiltered('ch_prospect_cft'),p=getFiltered('ch_partner_addition'),
    s=getFiltered('ch_showroom_addition'),aud=getFiltered('ch_showroom_audit'),
    crm=getFiltered('ch_crm_recovery'),cad=getFiltered('ch_cad_tat'),rnr=getFiltered('ch_rnr');
  const conv=f.filter(d=>d.status==='Converted').length,actP=p.filter(d=>d.status==='Active').length,openS=s.filter(d=>d.status==='Opened').length;
  const avgAud=avgOf(aud,'score');
  const cadDel=cad.filter(d=>d.tat!=null),avgTAT=cadDel.length?(cadDel.reduce((s,d)=>s+(+d.tat||0),0)/cadDel.length).toFixed(1):0;
  const totalCRM=sumOf(crm,'amount'),totalCRMP=sumOf(crm,'monthPlan'),crmAch=safePct(totalCRM,totalCRMP);
  const funnel=[{label:'Prospects',value:f.length,color:'#00B4D8',id:'kpi1'},{label:'Shortlisted',value:sl.length,color:'#FFD700',id:'kpi2'},{label:'CFT Cleared',value:cft.filter(d=>d.result==='Pass').length,color:'#a78bfa',id:'kpi3'},{label:'Activated',value:actP,color:'#4ade80',id:'kpi4'}];
  const monthly=MONTHS.map(({m,p:px})=>({month:m,prospects:f.filter(d=>d.date?.startsWith(px)).length,partners:p.filter(d=>(d.onboardingDate||d.date)?.startsWith(px)).length,showrooms:s.filter(d=>(d.openingDate||d.date)?.startsWith(px)).length}));
  const crmTrend=MONTHS.map(({m,p:px})=>{const rows=crm.filter(d=>d.date?.startsWith(px));return{month:m,actual:+rows.reduce((s,r)=>s+(+r.amount||0),0).toFixed(1),plan:+rows.reduce((s,r)=>s+(+r.monthPlan||0),0).toFixed(1)};});
  const cards=[
    {id:'kpi1',e:'🎯',label:'Prospects',value:f.length,sub:`${conv} converted`,c:'#00B4D8'},
    {id:'kpi4',e:'🤝',label:'Partners Onboarded',value:p.length,sub:`${actP} active`,c:'#4ade80'},
    {id:'kpi6',e:'🏪',label:'Showrooms Launched',value:s.length,sub:`${openS} opened`,c:'#FFD700'},
    {id:'kpi3',e:'🧪',label:'CFT Cleared',value:cft.filter(d=>d.result==='Pass').length,sub:`of ${cft.length} CFTs`,c:'#a78bfa'},
    {id:'kpi8',e:'⭐',label:'Avg Audit Score',value:`${avgAud}%`,sub:`${aud.length} audits`,c:'#f472b6'},
    {id:'kpi10',e:'💹',label:'CRM Recovered',value:fmtLakhs(totalCRM),sub:`${crmAch}% of plan`,c:'#fb923c'},
    {id:'kpi16',e:'⏱',label:'Avg CAD TAT',value:`${avgTAT}d`,sub:`SLA ≤${KPI_CONFIG.cadTAT.target}d`,c:+avgTAT<=KPI_CONFIG.cadTAT.target?'#4ade80':'#f87171'},
    {id:'kpi9',e:'🏆',label:'R&R Awards',value:rnr.length,sub:'this period',c:'#FFD700'},
  ];
  const health=[
    {l:'Prospect→Conversion',pct:safePct(conv,f.length),target:KPI_CONFIG.prospectConversion.target,id:'kpi1'},
    {l:'CFT Pass Rate',pct:safePct(cft.filter(d=>d.result==='Pass').length,cft.length),target:KPI_CONFIG.cftPassRate.target,id:'kpi3'},
    {l:'Partner Activation',pct:safePct(actP,p.length),target:80,id:'kpi4'},
    {l:'Showroom Commissioning',pct:safePct(openS,s.length),target:85,id:'kpi6'},
    {l:'Audit Quality Score',pct:avgAud,target:KPI_CONFIG.auditScoreTarget.target,id:'kpi13'},
    {l:'CAD TAT SLA (≤4d)',pct:safePct(cadDel.filter(d=>+d.tat<=4).length,cadDel.length),target:KPI_CONFIG.feedbackAdherence.target,id:'kpi16'},
  ].map(k=>({...k,status:k.pct>=k.target?'on':k.pct>=k.target*.8?'warn':'crit'}));
  const[onC,wC,cC]=[health.filter(k=>k.status==='on').length,health.filter(k=>k.status==='warn').length,health.filter(k=>k.status==='crit').length];
  return(<div style={{display:'flex',flexDirection:'column',gap:16}} className="fade-in">
    <div style={{borderRadius:18,padding:'16px 20px',background:'linear-gradient(135deg,rgba(0,180,216,.14),rgba(0,180,216,.04))',border:'1px solid rgba(0,180,216,.22)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
      <div>
        <div style={{fontSize:11,fontWeight:700,color:'#FFD700',marginBottom:4}}>⚡ Q4 2025 · Channel Management Network KPIs</div>
        <div style={{fontSize:19,fontWeight:800,color:'#fff',marginBottom:4}}>Channel Performance Overview 🏗️</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,.5)'}}>{onC} On Track · {wC} Attention · {cC} Critical</div>
      </div>
      <div style={{display:'flex',gap:20}}>
        {[[onC,'#4ade80','On Track'],[wC,'#FFD700','Attention'],[cC,'#f87171','Critical']].map(([v,c,l])=>(
          <div key={l} style={{textAlign:'center'}}><div style={{fontSize:26,fontWeight:800,color:c,lineHeight:1}}>{v}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)'}}>{l}</div></div>
        ))}
      </div>
    </div>
    {/* Activation funnel */}
    <div style={{...css.glass,borderRadius:18,padding:'16px 20px'}}>
      <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:3}}>🎯 Partner Activation Funnel</div>
      <div style={{fontSize:11,color:'rgba(255,255,255,.38)',marginBottom:14}}>Prospect → Shortlisted → CFT Cleared → Activated</div>
      <div style={{display:'flex'}}>
        {funnel.map((step,i)=>{const pct=!funnel[0].value?0:Math.round((step.value/funnel[0].value)*100);const drop=i>0?funnel[i-1].value-step.value:0;return(
          <div key={i} style={{flex:1}}>
            <div onClick={()=>setActiveKPI(step.id)} style={{borderRadius:i===0?'10px 0 0 10px':i===funnel.length-1?'0 10px 10px 0':'0',padding:'13px 10px',textAlign:'center',cursor:'pointer',background:`${step.color}16`,border:`1px solid ${step.color}30`,borderLeft:i>0?'none':''}}>
              <div style={{fontSize:24,fontWeight:800,color:step.color,lineHeight:1}}>{step.value}</div>
              <div style={{fontSize:11,fontWeight:600,color:'#fff',marginTop:3}}>{step.label}</div>
              <div style={{fontSize:10,color:step.color,marginTop:3}}>{pct}%{i>0?` · −${drop}`:''}</div>
            </div>
          </div>
        );})}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
      {cards.map(card=>(
        <div key={card.id} onClick={()=>setActiveKPI(card.id)} style={{...css.glass,borderRadius:15,padding:'13px 15px',cursor:'pointer',border:`1px solid ${card.c}18`}}>
          <div style={{fontSize:20,marginBottom:7}}>{card.e}</div>
          <div style={{fontSize:22,fontWeight:800,color:card.c,lineHeight:1}}>{card.value}</div>

/* ═══ GENERIC FinancialKPI (10,11,12) ══════════════════════ */
function FinancialKPI({title,desc,col,amtKey,planKey,color,isLakhs,extraCols=[],addFields,perms,showToast,getFiltered,addRecord,deleteRecord}){
  const data=getFiltered(col);const[open,setOpen]=useState(false);const[saving,setSaving]=useState(false);
  const init=addFields.reduce((a,f)=>({...a,[f.key]:f.default||''}),{});
  const[form,set,reset]=useForm(init);
  const totalA=sumOf(data,amtKey),totalP=sumOf(data,planKey),ach=safePct(totalA,totalP);
  const fmt=v=>isLakhs?fmtLakhs(v):fmtRupees(v);
  const monthly=MONTHS.map(({m,p})=>{const rows=data.filter(d=>d.date?.startsWith(p));return{month:m,actual:isLakhs?+rows.reduce((s,r)=>s+(+(r[amtKey]||0)),0).toFixed(1):Math.round(rows.reduce((s,r)=>s+(+(r[amtKey]||0)),0)),plan:isLakhs?+rows.reduce((s,r)=>s+(+(r[planKey]||0)),0).toFixed(1):Math.round(rows.reduce((s,r)=>s+(+(r[planKey]||0)),0))};});
  const cumul=MONTHS.map(({m,p})=>{const up=data.filter(d=>d.date<=p+'-31');return{month:m,actual:isLakhs?+up.reduce((s,r)=>s+(+(r[amtKey]||0)),0).toFixed(1):Math.round(up.reduce((s,r)=>s+(+(r[amtKey]||0)),0)),plan:isLakhs?+up.reduce((s,r)=>s+(+(r[planKey]||0)),0).toFixed(1):Math.round(up.reduce((s,r)=>s+(+(r[planKey]||0)),0))};});
  const baseCols=[{key:'date',label:'Date'},{key:'zone',label:'Zone'},...extraCols,
    {key:amtKey,label:`Actual ${isLakhs?'(₹L)':'(₹)'}`,render:v=><span style={{color,fontWeight:700}}>{fmt(v)}</span>},
    {key:planKey,label:`Plan ${isLakhs?'(₹L)':'(₹)'}`,render:v=><span style={{fontFamily:'monospace'}}>{fmt(v)}</span>},
    {key:'_a',label:'Achievement %',render:(_,row)=><AchBar value={+(row[amtKey]||0)} plan={+(row[planKey]||0)}/>},
    {key:'remarks',label:'Remarks'}];
  const add=async()=>{
    for(const f of addFields.filter(f=>f.required)){if(!String(form[f.key]||'').trim()){showToast(`${f.label} is required`,'error');return;}}
    if(form[amtKey]&&!isPosNum(form[amtKey])){showToast('Amount must be a positive number','error');return;}
    setSaving(true);await addRecord(col,form);showToast('Record added');reset();setOpen(false);setSaving(false);
  };
  return(<KPICard title={title} desc={desc}
    metrics={[{value:isLakhs?fmtLakhs(totalA):fmtK(totalA),label:'Total Recovered',color},{value:`${ach}%`,label:'Achievement',color:ach>=100?'#4ade80':'#FFD700'}]}
    onAdd={()=>setOpen(true)} perms={perms}>
    <G2 left={<><SL text="Monthly Plan vs Actual"/><BarChartSVG data={monthly} bars={[{key:'plan',label:'Plan'},{key:'actual',label:'Actual'}]} colors={['rgba(255,255,255,.12)',color]} formatY={isLakhs?v=>`₹${v}L`:undefined} height={165}/></>}
      right={<><SL text="Cumulative Recovery Trend"/><AreaChartSVG data={cumul} areas={[{key:'plan',label:'Plan',dash:true},{key:'actual',label:'Actual'}]} colors={['#FFD700',color]} formatY={isLakhs?v=>`₹${v}L`:undefined} height={165}/></>}/>
    <DTable cols={baseCols} data={data} onDelete={id=>deleteRecord(col,id)} perms={perms}/>
    <Modal open={open} onClose={()=>setOpen(false)} title={`Add — ${title.split('·')[1]?.trim()||'Record'}`}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {addFields.map(f=><FF key={f.key} label={f.label} required={f.required}>
          {f.type==='select'?<Sel value={form[f.key]} onChange={v=>set(f.key,v)} opts={f.opts}/>
           :f.type==='team'?<TeamSel value={form[f.key]} onChange={v=>set(f.key,v)}/>
           :<input type={f.type||'text'} min={f.min} step={f.step} value={form[f.key]} onChange={e=>set(f.key,e.target.value)} placeholder={f.ph||''} style={css.inp}/>}
        </FF>)}
      </div>
      <div style={{display:'flex',gap:10,marginTop:16}}><button onClick={()=>setOpen(false)} style={{...css.btnG,flex:1}}>Cancel</button><button onClick={add} disabled={saving} style={{...css.btnP,flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>{saving&&<Spinner size={14}/>}Add Record</button></div>
    </Modal>
  </KPICard>);
}

  const data=getFiltered(col);const[open,setOpen]=useState(false);const[saving,setSaving]=useState(false);
  const init=addFields.reduce((a,f)=>({...a,[f.key]:f.default||''}),{});
  const[form,set,reset]=useForm(init);
  const avg=avgOf(data,scoreKey);
  const radarData=radarParams.map(rp=>({subject:rp.label,value:avgOf(data,rp.key)}));

  const PCOLS=['#00B4D8','#a78bfa','#f87171','#4ade80'];

    for(const f of addFields.filter(f=>f.required)){if(!String(form[f.key]||'').trim()){showToast(`${f.label} is required`,'error');return;}}

      </div>
    </div>}
    right={<><SL text="Parameter Score Radar"/><RadarChartSVG data={radarData} color={color} height={230}/></>}/>
    <DTable cols={baseCols} data={data} onDelete={id=>deleteRecord(col,id)} perms={perms}/>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>

/* ═══ KPI 16 ════════════════════════════════════════════════ */
function KPI16({getFiltered,addRecord,deleteRecord,perms,showToast}){
  const data=getFiltered('ch_cad_tat');const[open,setOpen]=useState(false);const[saving,setSaving]=useState(false);
  const[form,set,reset]=useForm({date:'',projectName:'',zone:'',requestDate:'',deliveryDate:'',designerName:'',status:'Delivered'});
  const delivered=data.filter(d=>d.tat!=null);
  const avgTAT=delivered.length?(delivered.reduce((s,d)=>s+(+d.tat||0),0)/delivered.length).toFixed(1):0;
  const onTime=delivered.filter(d=>+d.tat<=KPI_CONFIG.cadTAT.target).length;
  const onTimePct=safePct(onTime,delivered.length);
  const tatTrend=delivered.slice().sort((a,b)=>(a.requestDate||a.date||'').localeCompare(b.requestDate||b.date||'')).map(d=>({date:(d.requestDate||d.date||'').slice(5),tat:+d.tat}));
  const zoneAvg=ZONES.map(z=>{const zd=delivered.filter(d=>d.zone===z);return{zone:z,avg:zd.length?+(zd.reduce((s,d)=>s+(+d.tat||0),0)/zd.length).toFixed(1):0};}).filter(z=>z.avg>0);
  const slaData=MONTHS.map(({m,p})=>{const md=delivered.filter(d=>(d.requestDate||d.date||'').startsWith(p));return{month:m,onTime:md.filter(d=>+d.tat<=KPI_CONFIG.cadTAT.target).length,delayed:md.filter(d=>+d.tat>KPI_CONFIG.cadTAT.target).length};});
  const cols=[{key:'date',label:'Date'},{key:'projectName',label:'Project'},{key:'zone',label:'Zone'},{key:'requestDate',label:'Requested'},{key:'deliveryDate',label:'Delivered'},{key:'tat',label:'TAT',render:v=>v!=null?<span style={{fontWeight:700,color:+v<=KPI_CONFIG.cadTAT.target?'#4ade80':'#f87171'}}>{v}d {+v<=KPI_CONFIG.cadTAT.target?'✓':'⚠'}</span>:<span style={{color:'rgba(255,255,255,.3)'}}>In Progress</span>},{key:'designerName',label:'Designer'},{key:'status',label:'Status',render:v=><Badge status={v}/>}];
  const add=async()=>{
    if(!chkForm(form,[['date','Date required'],['projectName','Project name required']],showToast))return;
    if(form.requestDate&&!isDate(form.requestDate)){showToast('Invalid request date','error');return;}
    if(form.deliveryDate&&!isDate(form.deliveryDate)){showToast('Invalid delivery date','error');return;}
    const tat=calcTAT(form.requestDate,form.deliveryDate);
    if(tat!==null&&tat<0){showToast('Delivery date cannot be before request date','error');return;}
    setSaving(true);await addRecord('ch_cad_tat',{...form,tat});showToast('CAD TAT record added');reset();setOpen(false);setSaving(false);
  };
  return(<KPICard title="KPI 16 · CAD Turnaround Time" desc={`Track CAD design turnaround — SLA target ≤${KPI_CONFIG.cadTAT.target} days`}
    metrics={[{value:`${avgTAT}d`,label:'Avg TAT',color:+avgTAT<=KPI_CONFIG.cadTAT.target?'#4ade80':'#f87171'},{value:`${onTimePct}%`,label:'Within SLA',color:'#00B4D8'}]}
    onAdd={()=>setOpen(true)} perms={perms}>
    <G2 left={<><SL text={`TAT Trend — SLA ≤${KPI_CONFIG.cadTAT.target} days`}/><LineChartSVG data={tatTrend} lines={[{key:'tat',label:'TAT (days)'}]} xKey="date" colors={['#00B4D8']} refLine={KPI_CONFIG.cadTAT.target} refLabel={`SLA ${KPI_CONFIG.cadTAT.target}d`} formatY={v=>`${v}d`} height={180}/></>}
      right={<><SL text="Monthly SLA Adherence"/><BarChartSVG data={slaData} bars={[{key:'onTime',label:'On Time'},{key:'delayed',label:'Delayed'}]} colors={['#4ade80','#f87171']} height={140}/><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:12}}>
        <div style={{borderRadius:11,padding:'11px',textAlign:'center',background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.2)'}}><div style={{fontSize:22,fontWeight:800,color:'#4ade80',lineHeight:1}}>{onTime}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:3}}>On Time (≤{KPI_CONFIG.cadTAT.target}d)</div></div>
        <div style={{borderRadius:11,padding:'11px',textAlign:'center',background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.2)'}}><div style={{fontSize:22,fontWeight:800,color:'#f87171',lineHeight:1}}>{delivered.length-onTime}</div><div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:3}}>Delayed</div></div>
      </div></>}/>
    <SL text="Zone-wise Avg TAT (days)"/>
    <BarChartSVG data={zoneAvg} bars={[{key:'avg',label:'Avg TAT'}]} xKey="zone" colors={['#00B4D8']} refLine={KPI_CONFIG.cadTAT.target} formatY={v=>`${v}d`} height={145}/>
    <div style={{marginTop:14}}><DTable cols={cols} data={data} onDelete={id=>deleteRecord('ch_cad_tat',id)} perms={perms}/></div>
    <Modal open={open} onClose={()=>setOpen(false)} title="Add CAD Turnaround Record">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FF label="Date" required><input type="date" value={form.date} onChange={e=>set('date',e.target.value)} style={css.inp}/></FF>
        <FF label="Project Name" required><input value={form.projectName} onChange={e=>set('projectName',e.target.value)} style={css.inp}/></FF>
        <FF label="Zone"><Sel value={form.zone} onChange={v=>set('zone',v)} opts={[{v:'',l:'Select'},...ZONES]}/></FF>
        <FF label="Designer"><TeamSel value={form.designerName} onChange={v=>set('designerName',v)}/></FF>
        <FF label="Request Date"><input type="date" value={form.requestDate} onChange={e=>set('requestDate',e.target.value)} style={css.inp}/></FF>
        <FF label="Delivery Date"><input type="date" value={form.deliveryDate} onChange={e=>set('deliveryDate',e.target.value)} style={css.inp}/></FF>
        <FF label="Status"><Sel value={form.status} onChange={v=>set('status',v)} opts={STATUS_DELIVERY}/></FF>
      </div>
      <div style={{fontSize:11,color:'rgba(255,255,255,.35)',marginTop:8}}>ℹ TAT auto-calculated from Request → Delivery dates</div>
      <div style={{display:'flex',gap:10,marginTop:12}}><button onClick={()=>setOpen(false)} style={{...css.btnG,flex:1}}>Cancel</button><button onClick={add} disabled={saving} style={{...css.btnP,flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>{saving&&<Spinner size={14}/>}Add Record</button></div>
    </Modal>
  </KPICard>);
}

    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
      {scoreCards.map(sc=><div key={sc.label} style={{...css.glass,borderRadius:13,padding:'13px 14px',textAlign:'center'}}><div style={{fontSize:20,fontWeight:800,color:sc.c,lineHeight:1}}>{sc.value}</div><div style={{fontSize:9,color:'rgba(255,255,255,.38)',marginTop:2}}>{sc.label}</div><div style={{fontSize:9,color:'rgba(255,255,255,.2)',marginTop:1}}>target {sc.t}</div></div>)}
    </div>
    <div style={{...css.glass,borderRadius:18,padding:'16px 20px'}}>
      <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:3}}>🎯 End-to-End Partner Activation Chain</div>
      <div style={{fontSize:11,color:'rgba(255,255,255,.38)',marginBottom:14}}>Prospect → Shortlisted → CFT Cleared → Activated</div>
      <div style={{display:'flex'}}>
        {funnel.map((step,i)=>{const pct=!funnel[0].value?0:Math.round((step.value/funnel[0].value)*100),drop=i>0?funnel[i-1].value-step.value:0;return<div key={i} style={{flex:1}}><div style={{borderRadius:i===0?'10px 0 0 10px':i===funnel.length-1?'0 10px 10px 0':'0',padding:'13px 10px',textAlign:'center',background:`${step.color}16`,border:`1px solid ${step.color}30`,borderLeft:i>0?'none':''}}><div style={{fontSize:24,fontWeight:800,color:step.color,lineHeight:1}}>{step.value}</div><div style={{fontSize:11,fontWeight:600,color:'#fff',marginTop:3}}>{step.label}</div><div style={{fontSize:10,color:step.color,marginTop:3}}>{pct}%{i>0?` · −${drop}`:''}</div></div></div>;})}
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div style={{...css.glass,borderRadius:18,padding:18}}>
        <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:3}}>Monthly Channel Activity</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.35)',marginBottom:13}}>Oct – Dec 2025</div>
        <BarChartSVG data={monthly} bars={[{key:'prospects',label:'Prospects'},{key:'partners',label:'Partners'},{key:'showrooms',label:'Showrooms'},{key:'cft',label:'CFTs'}]} colors={['#00B4D8','#4ade80','#FFD700','#a78bfa']} height={205}/>
      </div>
      <div style={{...css.glass,borderRadius:18,padding:18}}>
        <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:3}}>KPI Health Radar</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.35)',marginBottom:13}}>Normalised performance across all channel dimensions</div>
        <RadarChartSVG data={radarData} color="#00B4D8" height={225}/>
      </div>
    </div>
    <div style={{...css.glass,borderRadius:18,padding:18}}>
      <div style={{fontWeight:700,fontSize:13,color:'#fff',marginBottom:14}}>Zone-wise Channel Performance</div>
      <BarChartSVG data={zonePerf} bars={[{key:'prospects',label:'Prospects'},{key:'partners',label:'Partners'},{key:'showrooms',label:'Showrooms'}]} xKey="zone" colors={['#00B4D8','#4ade80','#FFD700']} height={185}/>
    </div>
    <div style={{...css.glass,borderRadius:18,padding:18}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}><span>💡</span><div style={{fontWeight:700,fontSize:13,color:'#fff'}}>AI-Powered Insights & Recommendations</div><span style={{marginLeft:'auto',fontSize:10,fontWeight:700,color:'#FFD700',background:'rgba(255,215,0,.1)',padding:'2px 8px',borderRadius:5,border:'1px solid rgba(255,215,0,.3)'}}>Q4 2025</span></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {insights.map((ins,i)=><div key={i} style={{borderRadius:12,padding:'13px 14px',background:`${ins.c}0d`,border:`1px solid ${ins.c}30`}}><div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:5}}>{ins.icon} {ins.title}</div><div style={{fontSize:12,color:'rgba(255,255,255,.55)',lineHeight:1.55,marginBottom:ins.action?6:0}}>{ins.body}</div>{ins.action&&<div style={{fontSize:11,fontWeight:600,color:ins.c}}>→ {ins.action}</div>}</div>)}
      </div>
    </div>
    <div style={{...css.glass,borderRadius:18,padding:18}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:13}}><span>⚠️</span><div style={{fontWeight:700,fontSize:13,color:'#fff'}}>Attention Items & Escalation Queue</div></div>
      <div style={{display:'flex',flexDirection:'column',gap:9}}>
        {alerts.map((a,i)=><div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',borderRadius:11,padding:'11px 15px',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:9,height:9,borderRadius:'50%',background:a.c,boxShadow:`0 0 7px ${a.c}`,flexShrink:0}}/><div><div style={{fontSize:13,fontWeight:600,color:'#fff'}}>{a.zone} Zone · {a.metric}</div><div style={{fontSize:11,color:'rgba(255,255,255,.42)',marginTop:1}}>{a.note}</div></div></div>
          <span style={{fontSize:11,fontWeight:700,color:a.c,background:`${a.c}18`,padding:'3px 10px',borderRadius:6,border:`1px solid ${a.c}35`,flexShrink:0,marginLeft:12}}>{a.c==='#f87171'?'Escalate':'Review'}</span>
        </div>)}
      </div>
    </div>
  </div>);
}

/* ═══ LOADING SCREEN ════════════════════════════════════════ */
function LoadingScreen(){
  return(<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#0A1628',gap:16}}>
    <div style={{width:60,height:60,borderRadius:16,background:'rgba(0,180,216,.15)',border:'1px solid rgba(0,180,216,.4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26}}>🏗️</div>
    <div style={{fontSize:14,color:'rgba(255,255,255,.5)'}}>Loading AIS Channel KPI…</div>
    <Spinner size={28}/>
  </div>);
}

/* ═══ APP ROOT ══════════════════════════════════════════════ */
function App(){
  const{auth,loginEmail,loginViewOnly,logout,perms,activeKPI,setActiveKPI,sidebarCollapsed,setSidebarCollapsed,dateRange,setDateRange,selectedZone,setSelectedZone,addRecord,deleteRecord,getFiltered,showToast,toast,isLoading,isSyncing,lastSyncTime,isOnline,refreshData,exportCSV}=useAppState();

  if(auth.loading)return <LoadingScreen/>;
  if(!auth.user&&!auth.viewOnly)return <AuthPage onLogin={loginEmail} onViewOnly={loginViewOnly}/>;

  const kp={getFiltered,addRecord,deleteRecord,perms,showToast};

  function renderKPI(){switch(activeKPI){
    case'overview':  return <Overview getFiltered={getFiltered} setActiveKPI={setActiveKPI}/>;
    case'analytics': return <Analytics getFiltered={getFiltered}/>;
    case'kpi1':  return <KPI1  {...kp}/>;case'kpi2':  return <KPI2  {...kp}/>;case'kpi3':  return <KPI3  {...kp}/>;
    case'kpi4':  return <KPI4  {...kp}/>;case'kpi5':  return <KPI5  {...kp}/>;case'kpi6':  return <KPI6  {...kp}/>;
    case'kpi7':  return <KPI7  {...kp}/>;case'kpi8':  return <KPI8  {...kp}/>;case'kpi9':  return <KPI9  {...kp}/>;
    case'kpi10': return <FinancialKPI {...kp} title="KPI 10 · CRM Cost Recovery" desc="Track CRM operating cost recovery from channel partners" col="ch_crm_recovery" amtKey="amount" planKey="monthPlan" color="#00B4D8" isLakhs={true} addFields={F10}/>;
    case'kpi11': return <FinancialKPI {...kp} title="KPI 11 · CSE Salary Recovery" desc="Track Channel Support Executive salary recovery from partners" col="ch_cse_salary" amtKey="amount" planKey="plan" color="#4ade80" isLakhs={false} extraCols={[{key:'cseName',label:'CSE Name'}]} addFields={F11}/>;
    case'kpi12': return <FinancialKPI {...kp} title="KPI 12 · Branding Cost Recovery" desc="Track partner co-branding and marketing cost recovery" col="ch_branding" amtKey="amount" planKey="plan" color="#f472b6" isLakhs={true} extraCols={[{key:'brandName',label:'Brand / Campaign'}]} addFields={F12}/>;
    case'kpi13': return <ScoreKPI {...kp} title="KPI 13 · Showroom Audit Quality Score (A & A+)" desc="Audit quality scores for A and A+ grade showrooms" col="ch_audit_score" scoreKey="auditScore" color="#4ade80" radarParams={R13} extraCols={[{key:'showroomName',label:'Showroom'}]} addFields={F13}/>;
    case'kpi14': return <ScoreKPI {...kp} title="KPI 14 · Partner Satisfaction Score (A & A+)" desc="Channel partner satisfaction survey scores" col="ch_partner_survey_score" scoreKey="surveyScore" color="#00B4D8" radarParams={R14} extraCols={[{key:'partnerName',label:'Partner'}]} addFields={F14}/>;
    case'kpi15': return <KPI15 {...kp}/>;
    case'kpi16': return <KPI16 {...kp}/>;
    default:     return <Overview getFiltered={getFiltered} setActiveKPI={setActiveKPI}/>;
  }}

  return(<div style={{display:'flex',height:'100vh',overflow:'hidden',background:`radial-gradient(ellipse at 12% 22%,rgba(0,180,216,.08) 0%,transparent 50%),radial-gradient(ellipse at 88% 78%,rgba(255,215,0,.05) 0%,transparent 50%),#0A1628`,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
    {/* Offline banner */}
    {!isOnline&&<div style={{position:'fixed',top:0,left:0,right:0,zIndex:300,background:'rgba(239,68,68,.95)',color:'#fff',textAlign:'center',padding:'8px 16px',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
      ⚠️ You are offline — changes will sync when connection is restored
    </div>}

    <Sidebar active={activeKPI} setActive={setActiveKPI} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed} auth={auth} logout={logout}/>

    <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden',marginTop:!isOnline?36:0}}>
      <Header active={activeKPI} auth={auth} dateRange={dateRange} setDateRange={setDateRange} selectedZone={selectedZone} setSelectedZone={setSelectedZone} isSyncing={isSyncing} lastSyncTime={lastSyncTime} refreshData={refreshData} exportCSV={exportCSV}/>

      {/* Full-screen loading overlay */}
      {isLoading&&<div style={{position:'absolute',inset:0,zIndex:90,background:'rgba(10,22,40,.8)',backdropFilter:'blur(4px)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}><Spinner size={36}/><div style={{fontSize:13,color:'rgba(255,255,255,.6)'}}>Loading data from Firestore…</div></div>}

      <main style={{flex:1,overflowY:'auto',padding:'18px 20px'}}>
        <div style={{maxWidth:1320,margin:'0 auto'}}>{renderKPI()}</div>
      </main>

      <footer style={{flexShrink:0,padding:'5px 18px',borderTop:'1px solid rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
        <span style={{fontSize:10,color:'rgba(255,255,255,.18)'}}>AIS Windows · Channel Management KPI Dashboard</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:10,color:isOnline?'rgba(74,222,128,.5)':'rgba(248,113,113,.5)',display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:isOnline?'#4ade80':'#f87171',display:'inline-block'}}/>
            {isOnline?'Live':'Offline'}
          </span>
          <span style={{fontSize:10,color:'rgba(255,255,255,.18)'}}>Internal dashboard — authenticated via Firebase</span>
        </div>
      </footer>
    </div>

    <Toast toast={toast}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
